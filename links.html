<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Find thatbrowncraft everywhere — Wattpad, Instagram, YouTube, Pinterest, Spotify and more.">
<title>Find Me — thatbrowncraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Lato:wght@300;400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--espresso:#2C1810;--walnut:#3B1F0A;--terracotta:#C8956B;--gold:#C9A96E;--cream:#E8D5B0;--parchment:#F5ECD7;--deepink:#1A0F08;--font-display:'Cormorant Garamond',Georgia,serif;--font-body:'Lato',sans-serif;--font-accent:'Libre Baskerville',Georgia,serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--espresso);color:var(--parchment);overflow-x:hidden;font-weight:300}
a{text-decoration:none;color:inherit}ul{list-style:none}img{max-width:100%;display:block}

#atmosphere{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.light-shaft{position:absolute;top:-30%;right:-10%;width:60vw;height:140vh;background:linear-gradient(148deg,rgba(201,169,110,.07) 0%,rgba(245,236,215,.04) 35%,transparent 65%);transform:rotate(-18deg);transform-origin:top right;animation:shaftBreath 9s ease-in-out infinite}
.light-shaft-2{position:absolute;top:30%;left:-15%;width:45vw;height:90vh;background:linear-gradient(42deg,rgba(200,149,107,.04) 0%,transparent 60%);transform:rotate(10deg);animation:shaftBreath 13s ease-in-out infinite reverse}
@keyframes shaftBreath{0%,100%{opacity:.7}50%{opacity:1}}
.mote{position:absolute;border-radius:50%;opacity:0;animation:moteDrift linear infinite;filter:blur(.4px)}
@keyframes moteDrift{0%{transform:translateY(105vh) translateX(0);opacity:0}8%{opacity:.9}35%{transform:translateY(70vh) translateX(20px);opacity:.6}60%{transform:translateY(40vh) translateX(-14px);opacity:.8}85%{transform:translateY(12vh) translateX(16px);opacity:.4}100%{transform:translateY(-8vh) translateX(0);opacity:0}}
.m1{width:3px;height:3px;background:rgba(201,169,110,.7);left:5%;animation-duration:24s;animation-delay:0s}.m2{width:2px;height:2px;background:rgba(245,236,215,.8);left:12%;animation-duration:31s;animation-delay:-7s}.m3{width:4px;height:4px;background:rgba(200,149,107,.5);left:19%;animation-duration:20s;animation-delay:-13s}.m4{width:2px;height:2px;background:rgba(201,169,110,.6);left:27%;animation-duration:35s;animation-delay:-4s}.m5{width:3px;height:3px;background:rgba(196,154,138,.5);left:34%;animation-duration:26s;animation-delay:-19s}.m6{width:2px;height:2px;background:rgba(245,236,215,.7);left:41%;animation-duration:29s;animation-delay:-9s}.m7{width:3px;height:3px;background:rgba(201,169,110,.6);left:49%;animation-duration:22s;animation-delay:-15s}.m8{width:2px;height:2px;background:rgba(200,149,107,.5);left:57%;animation-duration:33s;animation-delay:-2s}.m9{width:4px;height:4px;background:rgba(196,154,138,.4);left:64%;animation-duration:21s;animation-delay:-21s}.m10{width:2px;height:2px;background:rgba(245,236,215,.6);left:72%;animation-duration:28s;animation-delay:-6s}.m11{width:3px;height:3px;background:rgba(201,169,110,.7);left:79%;animation-duration:25s;animation-delay:-11s}.m12{width:2px;height:2px;background:rgba(200,149,107,.5);left:87%;animation-duration:32s;animation-delay:-17s}.m13{width:3px;height:3px;background:rgba(245,236,215,.5);left:93%;animation-duration:19s;animation-delay:-3s}.m14{width:2px;height:2px;background:rgba(201,169,110,.6);left:8%;animation-duration:27s;animation-delay:-14s}.m15{width:4px;height:4px;background:rgba(196,154,138,.4);left:23%;animation-duration:23s;animation-delay:-8s}.m16{width:2px;height:2px;background:rgba(245,236,215,.7);left:38%;animation-duration:30s;animation-delay:-18s}.m17{width:3px;height:3px;background:rgba(201,169,110,.5);left:53%;animation-duration:24s;animation-delay:-5s}.m18{width:2px;height:2px;background:rgba(200,149,107,.6);left:68%;animation-duration:36s;animation-delay:-12s}.m19{width:3px;height:3px;background:rgba(196,154,138,.5);left:82%;animation-duration:20s;animation-delay:-16s}.m20{width:2px;height:2px;background:rgba(245,236,215,.6);left:96%;animation-duration:28s;animation-delay:-1s}

.site-nav{position:fixed;top:0;left:0;right:0;z-index:900;padding:0 clamp(1.5rem,5vw,4rem);height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(44,24,16,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,169,110,.1);transition:background .4s}
.site-nav.scrolled{background:rgba(44,24,16,.97);border-bottom-color:rgba(201,169,110,.18)}
.nav-logo{display:flex;align-items:baseline}
.logo-that{font-family:var(--font-display);font-weight:500;font-size:1.45rem;color:var(--cream)}.logo-brown{font-family:var(--font-display);font-weight:500;font-size:1.45rem;color:var(--terracotta)}.logo-craft{font-family:var(--font-display);font-weight:400;font-size:1.45rem;color:var(--gold);font-style:italic}
.nav-links{display:flex;gap:clamp(1rem,2.5vw,2.2rem);align-items:center}
.nav-link{font-family:var(--font-body);font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(245,236,215,.5);transition:color .3s}
.nav-link:hover,.nav-link.active-page{color:var(--terracotta)}
.nav-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.nav-hamburger span{display:block;width:22px;height:1.5px;background:var(--cream);transition:.3s}
.nav-mobile{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(44,24,16,.98);padding:1.5rem 2rem 2rem;flex-direction:column;z-index:899;border-bottom:1px solid rgba(201,169,110,.15)}
.nav-mobile.open{display:flex}
.nav-mobile .nav-link{padding:.85rem 0;font-size:.82rem;border-bottom:1px solid rgba(201,169,110,.08);display:block}
section,nav,footer{position:relative;z-index:1}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

.page-header{padding:130px clamp(1.5rem,6vw,5rem) clamp(3rem,6vw,5rem);background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(59,31,10,.8) 0%,transparent 60%),linear-gradient(180deg,#2C1810 0%,#3B1F0A 100%);text-align:center;border-bottom:1px solid rgba(201,169,110,.12);position:relative;overflow:hidden}
.page-header::before{content:'';position:absolute;top:64px;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(201,169,110,.3) 30%,rgba(201,169,110,.5) 50%,rgba(201,169,110,.3) 70%,transparent)}
.page-header-eyebrow{font-family:var(--font-accent);font-style:italic;font-size:.8rem;color:rgba(201,169,110,.5);letter-spacing:.2em;display:block;margin-bottom:1rem}
.page-header-title{font-family:var(--font-display);font-size:clamp(2.8rem,7vw,5.5rem);font-weight:300;color:var(--cream);line-height:1;margin-bottom:.2em}
.page-header-title em{font-style:italic;color:var(--terracotta)}
.page-header-sub{font-family:var(--font-display);font-style:italic;font-size:clamp(.95rem,2vw,1.15rem);color:rgba(245,236,215,.38);margin-top:1.25rem;max-width:520px;margin-left:auto;margin-right:auto;line-height:1.65}
.orn-row{display:flex;align-items:center;gap:1rem;justify-content:center;margin:1.5rem auto;max-width:300px}
.orn-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(201,169,110,.4),transparent)}
.orn-motif{font-size:.7rem;color:rgba(201,169,110,.4);letter-spacing:.2em}

.links-wrap{max-width:700px;margin:0 auto;padding:clamp(3rem,7vw,6rem) clamp(1.5rem,5vw,3rem)}
.section-label{font-family:var(--font-body);font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:rgba(201,169,110,.45);text-align:center;display:block;margin-bottom:1.5rem}

.qr-card{display:flex;flex-direction:column;align-items:center;gap:1.25rem;margin-bottom:clamp(3rem,6vw,5rem);padding:2rem 1.5rem;background:rgba(59,31,10,.35);border:1px solid rgba(201,169,110,.12);border-top:2px solid rgba(201,169,110,.3);position:relative}
.qr-card::before{content:'📱';position:absolute;top:-1.1rem;left:50%;transform:translateX(-50%);background:var(--espresso);padding:0 .75rem;font-size:.9rem}
.qr-image{width:140px;height:140px;object-fit:contain;border:1px solid rgba(201,169,110,.15)}
.qr-placeholder{width:140px;height:140px;border:1px solid rgba(201,169,110,.2);display:flex;align-items:center;justify-content:center;background:rgba(59,31,10,.5);font-family:var(--font-display);font-style:italic;font-size:.85rem;color:rgba(245,236,215,.2);text-align:center;padding:.5rem}
.qr-label{font-family:var(--font-display);font-style:italic;font-size:1.05rem;color:rgba(245,236,215,.5);text-align:center}
.qr-sub{font-family:var(--font-body);font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(201,169,110,.35);text-align:center}

.link-list{display:flex;flex-direction:column;gap:.75rem;margin-bottom:clamp(3rem,6vw,5rem)}
.link-card{display:flex;align-items:center;gap:1.25rem;padding:1.25rem 1.5rem;background:rgba(44,24,16,.5);border:1px solid rgba(201,169,110,.1);transition:border-color .3s,background .3s,transform .3s;position:relative;overflow:hidden}
.link-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:rgba(201,169,110,.2);transition:background .3s}
.link-card:hover{border-color:rgba(201,169,110,.28);background:rgba(59,31,10,.55);transform:translateX(4px)}
.link-card:hover::before{background:var(--terracotta)}
.link-icon{font-size:1.6rem;flex-shrink:0;width:2.2rem;text-align:center;line-height:1}
.link-info{flex:1;min-width:0}
.link-platform{font-family:var(--font-display);font-size:1.2rem;font-weight:500;color:var(--cream);line-height:1;margin-bottom:.2rem}
.link-desc{font-family:var(--font-body);font-size:.72rem;color:rgba(245,236,215,.38);letter-spacing:.04em;line-height:1.4}
.link-arrow{font-size:.9rem;color:rgba(201,169,110,.25);transition:color .3s,transform .3s;flex-shrink:0}
.link-card:hover .link-arrow{color:var(--terracotta);transform:translateX(3px)}

.cms-loading{text-align:center;padding:2rem;font-family:var(--font-display);font-style:italic;color:rgba(245,236,215,.25);font-size:1rem}

.site-footer{background:var(--deepink);border-top:1px solid rgba(201,169,110,.1);padding:clamp(3rem,6vw,5rem) clamp(1.5rem,5vw,4rem) clamp(2rem,4vw,3rem)}
.footer-inner{max-width:900px;margin:0 auto;text-align:center}
.footer-logo{font-family:var(--font-display);font-size:1.6rem;margin-bottom:.5rem}
.fl-that{color:var(--cream);font-weight:500}.fl-brown{color:var(--terracotta);font-weight:500}.fl-craft{color:var(--gold);font-style:italic;font-weight:400}
.footer-tagline{font-family:var(--font-accent);font-style:italic;font-size:.85rem;color:rgba(201,169,110,.45);margin-bottom:2rem}
.footer-social{display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem;margin-bottom:2rem}
.social-pill{font-family:var(--font-body);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(245,236,215,.5);border:1px solid rgba(201,169,110,.15);padding:.45rem 1rem;transition:all .3s}
.social-pill:hover{color:var(--terracotta);border-color:rgba(200,149,107,.4)}
.footer-links{display:flex;flex-wrap:wrap;justify-content:center;gap:.3rem 1.5rem;margin-bottom:2rem}
.footer-link{font-family:var(--font-body);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(245,236,215,.3);transition:color .3s}
.footer-link:hover{color:var(--terracotta)}
.footer-rule{height:1px;background:linear-gradient(to right,transparent,rgba(201,169,110,.15),transparent);margin-bottom:1.5rem}
.footer-copy{font-family:var(--font-body);font-size:.6rem;letter-spacing:.12em;color:rgba(245,236,215,.2);text-transform:uppercase}

@media(max-width:640px){.nav-links{display:none}.nav-hamburger{display:flex}}
@media(prefers-reduced-motion:reduce){.mote,.light-shaft,.light-shaft-2{animation:none}.reveal{opacity:1;transform:none}}
</style>
</head>
<body>

<div id="atmosphere" aria-hidden="true">
  <div class="light-shaft"></div><div class="light-shaft-2"></div>
  <div class="mote m1"></div><div class="mote m2"></div><div class="mote m3"></div><div class="mote m4"></div><div class="mote m5"></div><div class="mote m6"></div><div class="mote m7"></div><div class="mote m8"></div><div class="mote m9"></div><div class="mote m10"></div><div class="mote m11"></div><div class="mote m12"></div><div class="mote m13"></div><div class="mote m14"></div><div class="mote m15"></div><div class="mote m16"></div><div class="mote m17"></div><div class="mote m18"></div><div class="mote m19"></div><div class="mote m20"></div>
</div>

<!-- NAV — shared component, injected by nav.js -->
<div id="site-nav-mount"></div>

<main>
  <header class="page-header">
    <span class="page-header-eyebrow">same story. different vibes.</span>
    <div class="orn-row" aria-hidden="true">
      <span class="orn-line"></span><span class="orn-motif">✦</span><span class="orn-line"></span>
    </div>
    <h1 class="page-header-title">Find <em>Me</em></h1>
    <p class="page-header-sub">"One scan away from chaos, drama, and fiction."</p>
  </header>

  <div class="links-wrap">
    <!-- QR card — from content/settings/links.md → qr_image, qr_label, qr_show -->
    <div class="qr-card reveal" id="qrCard">
      <div class="cms-loading">loading...</div>
    </div>
    <!-- Links — from content/settings/links.md → links[] -->
    <span class="section-label">find me here</span>
    <div class="link-list reveal" id="linkList">
      <div class="cms-loading">loading...</div>
    </div>
  </div>
</main>

<div id="site-footer-mount"></div>

<script>
/* SOURCE FILE: content/settings/links.md
   Fields used: qr_image, qr_label, qr_show, links[] (label, url, icon, description, is_active) */

const RAW_LINKS = 'https://raw.githubusercontent.com/thatbrowncraft/thatbrowncraft-cms-test/main/content/settings/links.md';

/* CMS image fields store root-relative paths like "/images/qr/scan.png"
   (public_folder). That breaks on GitHub Pages project sites, where "/"
   resolves to the domain root, not the repo subpath. Same fix cms-loader.js
   already applies to every other image on the site — links.html just
   never had it because it fetches links.md on its own instead of going
   through cms-loader.js. */
const resolveImg = path => path ? `https://raw.githubusercontent.com/thatbrowncraft/thatbrowncraft-cms-test/main/public${path}` : '';

function parseFrontmatterLinks(text) {
  const match = text.match(/^---\n([\s\S]*?)\n---/);
  if (!match) return {};
  const raw = match[1];
  const data = { links: [] };
  let inLinks = false;
  let currentLink = null;

  raw.split('\n').forEach(line => {
    if (line.match(/^qr_image:\s*"?([^"]*)"?/))  { data.qr_image = line.split(':')[1].trim().replace(/"/g,''); }
    if (line.match(/^qr_label:\s*"?([^"]*)"?/))  { data.qr_label = line.split(':').slice(1).join(':').trim().replace(/"/g,''); }
    if (line.match(/^qr_show:\s*(.+)/))           { data.qr_show = line.split(':')[1].trim() !== 'false'; }
    if (line.match(/^links:\s*$/))                { inLinks = true; return; }
    if (inLinks) {
      const newItem = line.match(/^  -\s*$/);
      const kv      = line.match(/^    (\w+):\s*"?([^"]*)"?\s*$/);
      const inlineKv= line.match(/^  - (\w+):\s*"?([^"]*)"?\s*$/);
      if (newItem)   { currentLink = {}; data.links.push(currentLink); }
      else if (inlineKv) { currentLink = { [inlineKv[1]]: inlineKv[2] }; data.links.push(currentLink); }
      else if (kv && currentLink) { currentLink[kv[1]] = kv[2]; }
    }
  });
  return data;
}

const DEFAULT_LINKS = [
  { icon:'📸', label:'Instagram',  url:'#',    description:'Chaos, aesthetics, and emotional damage.', is_active:'true' },
  { icon:'📖', label:'Wattpad',    url:'https://www.wattpad.com/user/Thatbrowncraft', description:'Where stories first learn to breathe.', is_active:'true' },
  { icon:'▶️', label:'YouTube',    url:'#',    description:'Words, edits, and little pieces of the universe.', is_active:'true' },
  { icon:'📌', label:'Pinterest',  url:'#',    description:'Moodboards and fictional lives.', is_active:'true' },
  { icon:'📝', label:'Inkitt',     url:'#',    description:'Another home for the stories.', is_active:'true' },
  { icon:'🎵', label:'Spotify',    url:'#',    description:'Songs behind the stories.', is_active:'true' },
  { icon:'✉️', label:'Email',      url:'mailto:#', description:'For collabs, questions, and fan mail that makes my day.', is_active:'true' }
];

function renderLinks(links) {
  const active = (links || DEFAULT_LINKS).filter(l => l.is_active !== 'false' && l.is_active !== false);
  document.getElementById('linkList').innerHTML = active.map(l => `
    <a href="${l.url || '#'}" class="link-card" ${l.url && !l.url.startsWith('mailto') ? 'target="_blank" rel="noopener noreferrer"' : ''}>
      <span class="link-icon">${l.icon || '✦'}</span>
      <div class="link-info">
        <div class="link-platform">${l.label || ''}</div>
        ${l.description ? `<div class="link-desc">${l.description}</div>` : ''}
      </div>
      <span class="link-arrow">→</span>
    </a>`).join('');
}

function renderQR(data) {
  const card = document.getElementById('qrCard');
  if (data.qr_show === false) { card.style.display = 'none'; return; }
  card.innerHTML = data.qr_image
    ? `<img class="qr-image" src="${resolveImg(data.qr_image)}" alt="QR Code — thatbrowncraft">
       <span class="qr-label">${data.qr_label || 'Scan to find the whole universe.'}</span>
       <span class="qr-sub">thatbrowncraft — everywhere</span>`
    : `<div class="qr-placeholder">Upload your QR code from the dashboard</div>
       <span class="qr-label">${data.qr_label || 'Scan to find the whole universe.'}</span>
       <span class="qr-sub">thatbrowncraft — everywhere</span>`;
}

async function loadContent() {
  try {
    const res = await fetch(RAW_LINKS);
    if (!res.ok) throw new Error('fetch failed');
    const data = parseFrontmatterLinks(await res.text());
    renderQR(data);
    renderLinks(data.links && data.links.length ? data.links : null);
  } catch(e) {
    console.warn('CMS fetch failed, showing defaults.', e);
    document.getElementById('qrCard').innerHTML = `<div class="qr-placeholder">Upload your QR code from the dashboard</div><span class="qr-label">Scan to find the whole universe.</span><span class="qr-sub">thatbrowncraft — everywhere</span>`;
    renderLinks(null);
  }
  const ro = new IntersectionObserver(e => { e.forEach(x => { if(x.isIntersecting){x.target.classList.add('visible');ro.unobserve(x.target);} }); }, { threshold:.08, rootMargin:'0px 0px -30px 0px' });
  document.querySelectorAll('.reveal').forEach(el => ro.observe(el));
}

// Nav scroll behaviour + hamburger are now wired up by nav.js
// once it injects the shared nav (see site-nav-mount above).
loadContent();
</script>
<script src="nav.js" defer></script>
<script src="footer.js" defer></script>
<script src="cms-loader.js" defer></script>
<script>document.querySelectorAll("#copyright-year").forEach(function(el){el.textContent="© "+new Date().getFullYear();});</script>
</body>
</html>
