<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="The Post Office. Letters written back to the readers who wrote in first.">
<title>Post Office — thatbrowncraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Lato:wght@300;400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --espresso:   #2C1810;
  --walnut:     #3B1F0A;
  --midbrown:   #8B5E3C;
  --terracotta: #C8956B;
  --gold:       #C9A96E;
  --cream:      #E8D5B0;
  --parchment:  #F5ECD7;
  --paper:      #F0E6CF;
  --deepink:    #1A0F08;
  --ink-fresh:  #2B1407;
  --fd: 'Cormorant Garamond', Georgia, serif;
  --fb: 'Lato', sans-serif;
  --fa: 'Libre Baskerville', Georgia, serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--espresso);color:var(--parchment);overflow-x:hidden;font-weight:300}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
ul{list-style:none}

/* ATMOSPHERE — identical to the rest of the site */
#atm{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ls{position:absolute;top:-30%;right:-10%;width:60vw;height:140vh;background:linear-gradient(148deg,rgba(201,169,110,.07) 0%,rgba(245,236,215,.04) 35%,transparent 65%);transform:rotate(-18deg);transform-origin:top right;animation:sb 9s ease-in-out infinite}
.ls2{position:absolute;top:30%;left:-15%;width:45vw;height:90vh;background:linear-gradient(42deg,rgba(200,149,107,.04) 0%,transparent 60%);transform:rotate(10deg);animation:sb 13s ease-in-out infinite reverse}
@keyframes sb{0%,100%{opacity:.7}50%{opacity:1}}
.mote{position:absolute;border-radius:50%;opacity:0;animation:md linear infinite;will-change:transform,opacity;filter:blur(.4px)}
@keyframes md{0%{transform:translateY(105vh) translateX(0);opacity:0}8%{opacity:.9}35%{transform:translateY(70vh) translateX(20px);opacity:.6}60%{transform:translateY(40vh) translateX(-14px);opacity:.8}85%{transform:translateY(12vh) translateX(16px);opacity:.4}100%{transform:translateY(-8vh) translateX(0);opacity:0}}
.m1{width:3px;height:3px;background:rgba(201,169,110,.7);left:5%;animation-duration:24s;animation-delay:0s}
.m2{width:2px;height:2px;background:rgba(245,236,215,.8);left:12%;animation-duration:31s;animation-delay:-7s}
.m3{width:4px;height:4px;background:rgba(200,149,107,.5);left:19%;animation-duration:20s;animation-delay:-13s}
.m4{width:2px;height:2px;background:rgba(201,169,110,.6);left:27%;animation-duration:35s;animation-delay:-4s}
.m5{width:3px;height:3px;background:rgba(196,154,138,.5);left:34%;animation-duration:26s;animation-delay:-19s}
.m6{width:2px;height:2px;background:rgba(245,236,215,.7);left:41%;animation-duration:29s;animation-delay:-9s}
.m7{width:3px;height:3px;background:rgba(201,169,110,.6);left:49%;animation-duration:22s;animation-delay:-15s}
.m8{width:2px;height:2px;background:rgba(200,149,107,.5);left:57%;animation-duration:33s;animation-delay:-2s}
.m9{width:4px;height:4px;background:rgba(196,154,138,.4);left:64%;animation-duration:21s;animation-delay:-21s}
.m10{width:2px;height:2px;background:rgba(245,236,215,.6);left:72%;animation-duration:28s;animation-delay:-6s}
.m11{width:3px;height:3px;background:rgba(201,169,110,.7);left:79%;animation-duration:25s;animation-delay:-11s}
.m12{width:2px;height:2px;background:rgba(200,149,107,.5);left:87%;animation-duration:32s;animation-delay:-17s}
.m13{width:3px;height:3px;background:rgba(245,236,215,.5);left:93%;animation-duration:19s;animation-delay:-3s}
.m14{width:2px;height:2px;background:rgba(201,169,110,.6);left:8%;animation-duration:27s;animation-delay:-14s}
.m15{width:4px;height:4px;background:rgba(196,154,138,.4);left:23%;animation-duration:23s;animation-delay:-8s}
.m16{width:2px;height:2px;background:rgba(245,236,215,.7);left:38%;animation-duration:30s;animation-delay:-18s}
.m17{width:3px;height:3px;background:rgba(201,169,110,.5);left:53%;animation-duration:24s;animation-delay:-5s}
.m18{width:2px;height:2px;background:rgba(200,149,107,.6);left:68%;animation-duration:36s;animation-delay:-12s}
.m19{width:3px;height:3px;background:rgba(196,154,138,.5);left:82%;animation-duration:20s;animation-delay:-16s}
.m20{width:2px;height:2px;background:rgba(245,236,215,.6);left:96%;animation-duration:28s;animation-delay:-1s}

/* NAV — identical to the rest of the site (markup injected by nav.js) */
.site-nav{position:fixed;top:0;left:0;right:0;z-index:900;padding:0 clamp(1.5rem,5vw,4rem);height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(44,24,16,.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,169,110,.1);transition:background .4s}
.site-nav.scrolled{background:rgba(44,24,16,.97);border-bottom-color:rgba(201,169,110,.18)}
.nav-logo{display:flex;align-items:baseline;line-height:1;letter-spacing:.01em}
.logo-that{font-family:var(--fd);font-weight:500;font-size:1.45rem;color:var(--cream);font-style:normal}
.logo-brown{font-family:var(--fd);font-weight:500;font-size:1.45rem;color:var(--terracotta);font-style:normal}
.logo-craft{font-family:var(--fd);font-weight:400;font-size:1.45rem;color:var(--gold);font-style:italic}
.nav-links{display:flex;gap:clamp(1rem,2.5vw,2.2rem);align-items:center}
.nav-link{font-family:var(--fb);font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(245,236,215,.5);transition:color .3s}
.nav-link:hover,.nav-link.active-page{color:var(--terracotta)}
.nav-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.nav-hamburger span{display:block;width:22px;height:1.5px;background:var(--cream);transition:.3s}
.nav-mobile{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(44,24,16,.98);padding:1.5rem 2rem 2rem;flex-direction:column;z-index:899;border-bottom:1px solid rgba(201,169,110,.15)}
.nav-mobile.open{display:flex}
.nav-mobile .nav-link{padding:.85rem 0;font-size:.82rem;border-bottom:1px solid rgba(201,169,110,.08);display:block}
section,nav,footer{position:relative;z-index:1}

/* PAGE HEADER — identical pattern to every other page */
.page-header{padding:120px clamp(1.5rem,6vw,5rem) clamp(3rem,5vw,4.5rem);background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(59,31,10,.8) 0%,transparent 60%),linear-gradient(180deg,#2C1810 0%,#3B1F0A 100%);text-align:center;border-bottom:1px solid rgba(201,169,110,.12);position:relative;overflow:hidden}
.page-header::before{content:'';position:absolute;top:64px;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(201,169,110,.3) 30%,rgba(201,169,110,.5) 50%,rgba(201,169,110,.3) 70%,transparent)}
.page-header-title{font-family:var(--fd);font-size:clamp(2.8rem,7vw,5.5rem);font-weight:300;color:var(--cream);line-height:1;min-height:1.1em}
.page-header-title em{font-style:italic;color:var(--terracotta)}
.orn-row{display:flex;align-items:center;gap:1rem;justify-content:center;margin:1.5rem auto;max-width:300px}
.orn-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(201,169,110,.4),transparent)}
.orn-motif{font-size:.7rem;color:rgba(201,169,110,.4);letter-spacing:.2em}
.page-header-sub{font-family:var(--fd);font-style:italic;font-size:clamp(.95rem,2vw,1.15rem);color:rgba(245,236,215,.38);max-width:520px;margin:0 auto;line-height:1.65;min-height:1.5em}

/* INTRO PARAGRAPH — CMS-driven, sits quietly under the header */
.po-intro-section{padding:0 clamp(1.5rem,5vw,4rem);background:var(--espresso)}
.po-intro-inner{max-width:640px;margin:0 auto;padding:clamp(2.5rem,5vw,3.5rem) 0}
.po-intro{font-family:var(--fd);font-style:italic;font-size:clamp(1rem,2.2vw,1.2rem);color:rgba(245,236,215,.55);line-height:1.9;text-align:center;white-space:pre-line}

/* REPLIES SECTION */
.po-replies-section{padding:0 clamp(1.5rem,5vw,4rem) clamp(4rem,8vw,6rem);background:var(--espresso)}
.po-replies-inner{max-width:1080px;margin:0 auto}
.section-eyebrow{font-family:var(--fa);font-style:italic;font-size:.78rem;color:rgba(201,169,110,.45);letter-spacing:.18em;display:block;margin-bottom:.6rem;text-align:center}
.section-heading{font-family:var(--fd);font-size:clamp(2rem,4.5vw,3.2rem);font-weight:400;color:var(--cream);line-height:1.1;text-align:center}
.section-heading em{font-style:italic;color:var(--terracotta)}

/* FILTERS — same generated-buttons pattern as bonus.html's filter bar */
.po-filters{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin:2.5rem 0 3rem}
.filter-btn{font-family:var(--fb);font-size:.63rem;letter-spacing:.13em;text-transform:uppercase;padding:.55rem 1.3rem;border:1px solid rgba(200,149,107,.28);background:none;color:rgba(245,236,215,.45);cursor:pointer;transition:all .3s}
.filter-btn:hover{border-color:var(--terracotta);color:var(--terracotta)}
.filter-btn.active{background:rgba(200,149,107,.16);border-color:var(--terracotta);color:var(--parchment)}

/* SORT & FILTER — a small popover above the letters, built from the
   exact same pill/button language as .filter-btn above so it reads
   as part of the existing Post Office, not a bolted-on admin panel */
.po-sf-bar{display:flex;justify-content:center;align-items:center;gap:.9rem;margin:2.5rem 0 0;flex-wrap:wrap}
.sf-toggle-btn{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--fb);font-size:.63rem;letter-spacing:.13em;text-transform:uppercase;padding:.55rem 1.3rem;border:1px solid rgba(201,169,110,.35);background:rgba(200,149,107,.06);color:rgba(245,236,215,.7);cursor:pointer;transition:all .3s}
.sf-toggle-btn:hover,.sf-toggle-btn.open{border-color:var(--terracotta);color:var(--terracotta);background:rgba(200,149,107,.14)}
.sf-toggle-icon{font-size:.75rem;color:var(--gold)}
.sf-clear-btn{font-family:var(--fb);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(245,236,215,.4);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px;transition:color .3s}
.sf-clear-btn:hover{color:var(--terracotta)}

.sf-panel{position:relative;max-width:640px;margin:1.1rem auto 0;background:var(--paper);background-image:radial-gradient(rgba(139,94,60,.06) 1px, transparent 1px);background-size:7px 7px;border:1px solid rgba(59,31,10,.12);box-shadow:0 14px 36px rgba(0,0,0,.45);padding:1.6rem 1.7rem;transform-origin:top center;animation:sfOpen .28s ease}
.sf-panel[hidden]{display:none}
@keyframes sfOpen{from{opacity:0;transform:translateY(-8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

.sf-group{margin-bottom:1.3rem}
.sf-group:last-child{margin-bottom:0}
.sf-group[hidden]{display:none}
.sf-group-label{display:block;font-family:var(--fa);font-style:italic;font-size:.72rem;letter-spacing:.08em;color:rgba(43,20,7,.55);margin-bottom:.55rem}

.sf-select{width:100%;font-family:var(--fb);font-size:.78rem;letter-spacing:.03em;padding:.6rem .8rem;border:1px solid rgba(59,31,10,.22);background:var(--parchment);color:var(--ink-fresh);cursor:pointer}
.sf-select:focus{outline:none;border-color:var(--terracotta)}

.sf-pills{display:flex;flex-wrap:wrap;gap:.5rem}
.sf-pill{font-family:var(--fb);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;padding:.4rem 1rem;border:1px solid rgba(59,31,10,.2);background:none;color:rgba(43,20,7,.55);cursor:pointer;transition:all .25s}
.sf-pill:hover{border-color:var(--midbrown);color:var(--walnut)}
.sf-pill.active{background:var(--midbrown);border-color:var(--midbrown);color:var(--parchment)}

@media(max-width:600px){.sf-panel{padding:1.35rem 1.2rem}}
@media(prefers-reduced-motion:reduce){.sf-panel{animation:none}}

/* REPLY LETTERS — a box of preserved postcards, not a modern grid */
.po-replies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2.5rem 2rem;margin-top:1rem}

.reply-letter{
  position:relative;
  background:var(--paper);
  background-image:radial-gradient(rgba(139,94,60,.06) 1px, transparent 1px);
  background-size:7px 7px;
  padding:3.4rem 1.85rem 2.6rem;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  border:1px solid rgba(59,31,10,.08);
  transition:transform .35s,box-shadow .35s;
}
.reply-letter:nth-child(3n+1){transform:rotate(-.6deg)}
.reply-letter:nth-child(3n+2){transform:rotate(.55deg)}
.reply-letter:nth-child(3n){transform:rotate(-.3deg)}
.reply-letter:hover{transform:rotate(0deg) translateY(-6px)!important;box-shadow:0 16px 40px rgba(0,0,0,.5)}

.reply-postmark{position:absolute;top:1.15rem;left:1.15rem;width:44px;height:44px;border-radius:50%;border:1px solid rgba(59,31,10,.16);opacity:.4;pointer-events:none}
.reply-postmark::before{content:'';position:absolute;inset:6px;border:1px dashed rgba(59,31,10,.14);border-radius:50%}

.reply-stamp{position:absolute;top:1.05rem;right:1.05rem;width:36px;height:42px;border:1px dashed rgba(59,31,10,.32);background:linear-gradient(135deg,rgba(200,149,107,.25),rgba(201,169,110,.12));display:flex;align-items:center;justify-content:center;font-size:.95rem;color:rgba(59,31,10,.5);transform:rotate(-5deg)}

.reply-featured-tag{position:absolute;top:-11px;left:1.6rem;background:var(--gold);color:var(--espresso);font-family:var(--fb);font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .75rem;box-shadow:0 3px 8px rgba(0,0,0,.3);transform:rotate(-2deg);white-space:nowrap}

.reply-letter.is-featured{box-shadow:0 6px 26px rgba(0,0,0,.45);border-color:rgba(201,169,110,.22)}

.reply-project{display:inline-block;font-family:var(--fb);font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--terracotta);opacity:.75;margin-bottom:.55rem}
.reply-to{font-family:var(--fd);font-style:italic;font-size:1.02rem;color:var(--terracotta);margin-bottom:.4rem}
.reply-title{font-family:var(--fd);font-size:1.5rem;font-weight:500;color:var(--ink-fresh);line-height:1.22;margin-bottom:.35rem}
.reply-subtitle{font-family:var(--fa);font-style:italic;font-size:.82rem;color:rgba(43,20,7,.78);margin-bottom:1.1rem}
.reply-body{font-family:var(--fd);font-size:.98rem;color:rgba(43,20,7,.94);line-height:1.95}
.reply-body p{margin-bottom:.85rem}
.reply-body p:last-child{margin-bottom:0}
.reply-body.clamped{display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden}
.read-more-btn{display:inline-block;background:none;border:none;font-family:var(--fb);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--terracotta);cursor:pointer;margin-top:.7rem;padding:0}
.read-more-btn:hover{color:var(--walnut);text-decoration:underline}

.reply-seal{position:absolute;bottom:-15px;right:1.9rem;width:34px;height:34px;border-radius:50% 50% 50% 4px;background:radial-gradient(circle at 35% 30%,var(--terracotta),var(--walnut) 78%);box-shadow:0 3px 9px rgba(0,0,0,.4),inset 0 1px 2px rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:rgba(245,236,215,.85);transform:rotate(-9deg)}

/* PERMALINK — a small, quiet corner mark; not a redesign, just a
   copyable/clickable link to this one letter (#reply-{slug}) */
.reply-permalink{position:absolute;bottom:.9rem;left:1.2rem;font-size:.7rem;text-decoration:none;opacity:.3;transition:opacity .3s}
.reply-permalink:hover,.reply-permalink:focus-visible{opacity:.85}

/* Brief, temporary glow when a shared link scrolls a letter into
   view — fades on its own, no lasting change to the card itself */
.reply-letter.reply-highlight{box-shadow:0 0 0 3px rgba(201,169,110,.55),0 16px 40px rgba(0,0,0,.5);transition:box-shadow .6s ease}

/* LOAD MORE — same visual language as the filter pills */
.po-load-more-wrap{display:flex;justify-content:center;margin-top:2.5rem}
.po-load-more-btn{font-family:var(--fb);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;padding:.75rem 2rem;border:1px solid rgba(200,149,107,.35);background:none;color:rgba(245,236,215,.6);cursor:pointer;transition:all .3s}
.po-load-more-btn:hover{border-color:var(--terracotta);color:var(--terracotta);background:rgba(200,149,107,.06)}

.cms-empty{font-family:var(--fd);font-style:italic;color:rgba(245,236,215,.3)}

/* CLOSING NOTE — the quiet, handwritten ending to the room */
.po-closing-section{padding:clamp(3rem,6vw,4.5rem) clamp(1.5rem,5vw,4rem) clamp(4.5rem,8vw,6rem);text-align:center;background:linear-gradient(180deg,var(--espresso) 0%,#3B1F0A 100%);border-top:1px solid rgba(201,169,110,.08)}
.po-closing-inner{max-width:560px;margin:0 auto}
.po-closing-note{font-family:var(--fd);font-style:italic;font-size:clamp(1rem,2.2vw,1.2rem);color:rgba(245,236,215,.5);line-height:1.9}
.po-closing-note p{margin-bottom:.8rem}
.po-closing-note p:last-child{margin-bottom:0}

/* REVEAL */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .8s ease,transform .8s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}.d5{transition-delay:.5s}

/* FOOTER — identical to the rest of the site (markup injected by footer.js) */
.site-footer{background:var(--deepink);padding:clamp(3rem,6vw,5rem) clamp(1.5rem,6vw,5rem) 2.5rem;text-align:center;border-top:1px solid rgba(201,169,110,.1);position:relative;overflow:hidden}
.site-footer::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60%;height:40%;background:radial-gradient(ellipse,rgba(200,149,107,.05),transparent 70%);pointer-events:none}
.footer-inner{max-width:900px;margin:0 auto;position:relative;z-index:1}
.footer-logo{display:flex;align-items:baseline;justify-content:center;margin-bottom:.4rem}
.fl-that{font-family:var(--fd);font-weight:500;font-size:2rem;color:rgba(245,236,215,.6)}
.fl-brown{font-family:var(--fd);font-weight:500;font-size:2rem;color:var(--terracotta);opacity:.75}
.fl-craft{font-family:var(--fd);font-weight:400;font-size:2rem;color:var(--gold);font-style:italic;opacity:.65}
.footer-tagline{font-family:var(--fd);font-style:italic;font-size:.88rem;color:rgba(245,236,215,.22);margin-bottom:2.5rem}
.footer-social{display:flex;justify-content:center;flex-wrap:wrap;gap:.6rem;margin-bottom:2.5rem}
.social-pill{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem 1rem;border:1px solid rgba(201,169,110,.14);font-family:var(--fb);font-size:.65rem;letter-spacing:.08em;color:rgba(245,236,215,.33);transition:all .3s}
.social-pill:hover{border-color:var(--terracotta);color:var(--terracotta)}
.footer-links{display:flex;justify-content:center;flex-wrap:wrap;gap:.5rem 1.75rem;margin-bottom:2.5rem}
.footer-link{font-family:var(--fb);font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,236,215,.25);transition:color .3s}
.footer-link:hover{color:var(--terracotta)}
.footer-rule{height:1px;background:rgba(201,169,110,.1);margin-bottom:1.5rem}
.footer-copy{font-family:var(--fb);font-size:.62rem;color:rgba(245,236,215,.18);letter-spacing:.03em}

@media(max-width:768px){.nav-links{display:none}.nav-hamburger{display:flex}}
@media(max-width:600px){
  /* Postcards were reading narrower than they needed to on phones —
     the section's own side padding plus the card's side padding were
     both full-size at once. Trim the section's outer margin here so
     the card itself gets more of the screen, and ease the card's own
     side padding back a little while keeping it clearly generous. */
  .po-replies-section{padding-left:.85rem;padding-right:.85rem}
  .reply-letter{padding:3.2rem 1.35rem 2.3rem}
}
@media(prefers-reduced-motion:reduce){
  .mote,.ls,.ls2{display:none}
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
  .reveal{opacity:1;transform:none}
  .reply-letter,.reply-letter:nth-child(3n+1),.reply-letter:nth-child(3n+2),.reply-letter:nth-child(3n){transform:none}
}
</style>
</head>
<body>

<div id="atm" aria-hidden="true">
  <div class="ls"></div><div class="ls2"></div>
  <span class="mote m1"></span><span class="mote m2"></span><span class="mote m3"></span>
  <span class="mote m4"></span><span class="mote m5"></span><span class="mote m6"></span>
  <span class="mote m7"></span><span class="mote m8"></span><span class="mote m9"></span>
  <span class="mote m10"></span><span class="mote m11"></span><span class="mote m12"></span>
  <span class="mote m13"></span><span class="mote m14"></span><span class="mote m15"></span>
  <span class="mote m16"></span><span class="mote m17"></span><span class="mote m18"></span>
  <span class="mote m19"></span><span class="mote m20"></span>
</div>

<main>

<header class="page-header">
  <h1 class="page-header-title" data-cms="po-title"></h1>
  <div class="orn-row" aria-hidden="true">
    <div class="orn-line"></div><span class="orn-motif">✦ ✦ ✦</span><div class="orn-line"></div>
  </div>
  <p class="page-header-sub" data-cms="po-subtitle"></p>
</header>

<!-- INTRO PARAGRAPH -->
<section class="po-intro-section">
  <div class="po-intro-inner">
    <p class="po-intro reveal" data-cms="po-intro"></p>
  </div>
</section>

<!-- REPLIES -->
<section class="po-replies-section" id="replies">
  <div class="po-replies-inner">
    <div class="reveal">
      <span class="section-eyebrow" data-cms="po-section-eyebrow" style="display:none"></span>
      <h2 class="section-heading" data-cms="po-section-heading" style="display:none"></h2>
    </div>

    <!-- SORT & FILTER — sits above the existing Story pills below,
         which are left completely untouched. Everything in here is
         populated/hidden by JS based on what actually exists among
         the published letters (see the script at the bottom of this
         page), so a Craftie tag, letter type, or the Featured toggle
         simply never appears until at least one letter uses it. -->
    <div class="po-sf-bar">
      <button type="button" class="sf-toggle-btn" id="po-sf-toggle" aria-expanded="false" aria-controls="po-sf-panel">
        <span class="sf-toggle-icon">✦</span> Sort &amp; Filter
      </button>
      <button type="button" class="sf-clear-btn" id="po-sf-clear" style="display:none">Clear Filters</button>
    </div>

    <div class="sf-panel" id="po-sf-panel" hidden>
      <div class="sf-group">
        <span class="sf-group-label">Sort By</span>
        <select class="sf-select" id="po-sf-sort">
          <option value="manual">Manual Order</option>
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="az">Title A → Z</option>
          <option value="za">Title Z → A</option>
        </select>
      </div>

      <div class="sf-group" id="po-sf-visibility-group">
        <span class="sf-group-label">Craftie</span>
        <div class="sf-pills" id="po-sf-visibility">
          <button type="button" class="sf-pill active" data-value="all">All</button>
          <button type="button" class="sf-pill" data-value="named">Named Crafties</button>
          <button type="button" class="sf-pill" data-value="anonymous">Anonymous Crafties</button>
        </div>
      </div>

      <div class="sf-group" id="po-sf-type-group" hidden>
        <span class="sf-group-label">Letter Type</span>
        <div class="sf-pills" id="po-sf-type"></div>
      </div>

      <div class="sf-group" id="po-sf-featured-group" hidden>
        <span class="sf-group-label">Featured</span>
        <div class="sf-pills">
          <button type="button" class="sf-pill" id="po-sf-featured" data-value="featured">✦ Featured Only</button>
        </div>
      </div>

      <div class="sf-group" id="po-sf-tags-group" hidden>
        <span class="sf-group-label">Tags</span>
        <div class="sf-pills" id="po-sf-tags"></div>
      </div>
    </div>

    <div class="po-filters" data-cms="po-filters">
      <button class="filter-btn active" data-filter="all">All</button>
    </div>

    <div class="po-replies-grid" data-cms="po-replies-grid"></div>

    <div class="po-load-more-wrap">
      <button type="button" class="po-load-more-btn" id="po-load-more" style="display:none"><span data-cms="po-load-more-text"></span></button>
    </div>
  </div>
</section>

</main>

<!-- CLOSING NOTE — quiet, handwritten, CMS-driven, hidden entirely when empty -->
<section class="po-closing-section" data-cms="po-closing-section" style="display:none">
  <div class="po-closing-inner">
    <div class="orn-row" aria-hidden="true">
      <div class="orn-line"></div><span class="orn-motif">✦</span><div class="orn-line"></div>
    </div>
    <div class="po-closing-note" data-cms="po-closing-note"></div>
  </div>
</section>

<div id="site-footer-mount"></div>

<script>
// NAV scroll + hamburger behaviour is wired up by nav.js once it
// injects the shared nav (see site-nav-mount above).

// SCROLL REVEAL — identical pattern to every other page
if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
  document.querySelectorAll('.reveal').forEach(function(el) { obs.observe(el); });
} else {
  document.querySelectorAll('.reveal').forEach(function(el) { el.classList.add('visible'); });
}

// LETTERS: SORT & FILTER + "LOAD MORE" PAGINATION + PERMALINKS
// ------------------------------------------------------------------
// cms-loader.js renders every published letter into the grid in one
// shot (it has to — this static site has no server to page requests
// through), then fires "cms:po-replies-rendered" once that's done.
// Everything below just controls which of those already-rendered
// cards are visible and in what order, so the page still scales fine
// to hundreds of letters without ever hiding functionality behind a
// second network request.
//
// This section is organized as:
//   1. State (+ sessionStorage persistence)
//   2. Card metadata / matching / sorting helpers
//   3. Dynamic filter UI generation (hides anything with 0 matches)
//   4. applyView() — the single function that filters+sorts+paginates
//   5. Event wiring
(function () {
  var PAGE_SIZE = 9; // how many letters (per active filter) show before "Read More Letters" is needed
  var currentFilter = 'all'; // Story/Project filter — unchanged, still driven by .po-filters
  var visibleCount = PAGE_SIZE;
  var loadMoreBtn = document.getElementById('po-load-more');

  // ── 1. Sort & Filter state ──────────────────────────────────────
  var state = {
    sort: 'manual',       // manual | newest | oldest | az | za
    visibility: 'all',    // all | named | anonymous
    type: 'all',          // all | reply | shared_letter | review | postcard | appreciation | other
    featured: false,      // Featured Only toggle
    tags: new Set()       // any of the selected tags matches (OR)
  };

  var SESSION_KEY = 'po-sort-filter-v1';
  function saveState() {
    try {
      sessionStorage.setItem(SESSION_KEY, JSON.stringify({
        filter: currentFilter,
        sort: state.sort,
        visibility: state.visibility,
        type: state.type,
        featured: state.featured,
        tags: Array.prototype.slice.call(state.tags)
      }));
    } catch (e) { /* private mode / storage blocked — filters just won't persist, nothing else breaks */ }
  }
  function loadState() {
    try {
      var raw = sessionStorage.getItem(SESSION_KEY);
      if (!raw) return;
      var saved = JSON.parse(raw);
      currentFilter = saved.filter || 'all';
      state.sort = saved.sort || 'manual';
      state.visibility = saved.visibility || 'all';
      state.type = saved.type || 'all';
      state.featured = !!saved.featured;
      state.tags = new Set(saved.tags || []);
    } catch (e) { /* corrupt/blocked storage — just start fresh */ }
  }

  function escLite(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // ── 2. Card metadata / matching / sorting ───────────────────────
  function allCards() {
    return Array.prototype.slice.call(document.querySelectorAll('.po-replies-grid .reply-letter'));
  }

  // Reads the data-* attributes cms-loader.js already wrote onto each
  // card — no parsing of the card's visible text, no extra fetch.
  function meta(card) {
    var d = card.dataset;
    return {
      project: d.project || '',
      visibility: d.visibility || '',
      type: d.letterType || '',
      tags: d.tags ? d.tags.split('|').filter(Boolean) : [],
      featured: d.featured === '1',
      sortOrder: (d.sortOrder !== undefined && d.sortOrder !== '') ? Number(d.sortOrder) : '',
      date: (d.date !== undefined && d.date !== '') ? Number(d.date) : '',
      naturalIndex: d.naturalIndex !== undefined ? Number(d.naturalIndex) : 0
    };
  }

  function titleOf(card) {
    var el = card.querySelector('.reply-title');
    return el ? el.textContent.trim() : '';
  }

  function matchesFilters(card) {
    var m = meta(card);
    if (currentFilter !== 'all' && m.project !== currentFilter) return false;
    if (state.visibility !== 'all' && m.visibility !== state.visibility) return false;
    if (state.type !== 'all' && m.type !== state.type) return false;
    if (state.featured && !m.featured) return false;
    if (state.tags.size && !m.tags.some(function (t) { return state.tags.has(t); })) return false;
    return true;
  }

  // Manual Order falls back to each card's original (featured-first,
  // CMS-fetch-order) position whenever a Sort Order number is missing
  // — so with no Sort Order set on anything, Manual Order looks
  // identical to today's behaviour. Newest/Oldest push undated
  // letters to the end rather than guessing "now" for them.
  function compareFn(mode) {
    switch (mode) {
      case 'newest':
        return function (a, b) {
          var da = meta(a).date, db = meta(b).date;
          if (da === '' && db === '') return meta(a).naturalIndex - meta(b).naturalIndex;
          if (da === '') return 1;
          if (db === '') return -1;
          return db - da;
        };
      case 'oldest':
        return function (a, b) {
          var da = meta(a).date, db = meta(b).date;
          if (da === '' && db === '') return meta(a).naturalIndex - meta(b).naturalIndex;
          if (da === '') return 1;
          if (db === '') return -1;
          return da - db;
        };
      case 'az':
        return function (a, b) { return titleOf(a).localeCompare(titleOf(b)); };
      case 'za':
        return function (a, b) { return titleOf(b).localeCompare(titleOf(a)); };
      case 'manual':
      default:
        return function (a, b) {
          var oa = meta(a).sortOrder, ob = meta(b).sortOrder;
          var na = oa === '' ? Infinity : oa;
          var nb = ob === '' ? Infinity : ob;
          if (na !== nb) return na - nb;
          return meta(a).naturalIndex - meta(b).naturalIndex;
        };
    }
  }

  // ── 3. Dynamic filter UI — only ever shows options that at least
  // one currently-published letter actually has ──────────────────
  var LETTER_TYPE_LABELS = {
    reply: 'Reply', shared_letter: 'Shared Letter', review: 'Review',
    postcard: 'Postcard', appreciation: 'Appreciation', other: 'Other'
  };
  function tagLabel(t) {
    return t.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
  }

  function buildDynamicUI() {
    var metas = allCards().map(meta);

    // Letter Type — fixed CMS option order (not alphabetical), only
    // the types actually in use among published letters.
    var typesPresent = Object.keys(LETTER_TYPE_LABELS).filter(function (k) {
      return metas.some(function (m) { return m.type === k; });
    });
    var typeGroup = document.getElementById('po-sf-type-group');
    var typeWrap = document.getElementById('po-sf-type');
    if (typesPresent.length) {
      typeWrap.innerHTML = '<button type="button" class="sf-pill active" data-value="all">All</button>' +
        typesPresent.map(function (k) {
          return '<button type="button" class="sf-pill" data-value="' + escLite(k) + '">' + escLite(LETTER_TYPE_LABELS[k]) + '</button>';
        }).join('');
      typeGroup.hidden = false;
    } else {
      typeGroup.hidden = true;
    }

    // Featured — hide the toggle entirely if nothing is featured yet
    document.getElementById('po-sf-featured-group').hidden =
      !metas.some(function (m) { return m.featured; });

    // Craftie (visibility) — hide either pill that never occurs, and
    // hide the whole group if only one value exists across the board
    // (nothing left to meaningfully filter by).
    var hasNamed = metas.some(function (m) { return m.visibility === 'named'; });
    var hasAnon = metas.some(function (m) { return m.visibility === 'anonymous'; });
    var namedBtn = document.querySelector('#po-sf-visibility [data-value="named"]');
    var anonBtn = document.querySelector('#po-sf-visibility [data-value="anonymous"]');
    if (namedBtn) namedBtn.style.display = hasNamed ? '' : 'none';
    if (anonBtn) anonBtn.style.display = hasAnon ? '' : 'none';
    document.getElementById('po-sf-visibility-group').hidden = !(hasNamed && hasAnon);

    // Tags — every distinct tag actually in use among published
    // letters, alphabetically. A brand-new tag typed into the CMS
    // appears here with zero code changes; a tag no longer used by
    // any letter quietly disappears on its own.
    var tagSet = {};
    metas.forEach(function (m) { m.tags.forEach(function (t) { tagSet[t] = true; }); });
    var tags = Object.keys(tagSet).sort();
    var tagsGroup = document.getElementById('po-sf-tags-group');
    var tagsWrap = document.getElementById('po-sf-tags');
    if (tags.length) {
      tagsWrap.innerHTML = tags.map(function (t) {
        return '<button type="button" class="sf-pill" data-value="' + escLite(t) + '">' + escLite(tagLabel(t)) + '</button>';
      }).join('');
      tagsGroup.hidden = false;
    } else {
      tagsGroup.hidden = true;
    }
  }

  // Reflects `state` (and `currentFilter`) onto every button/select
  // in the UI — used after restoring a saved session and after
  // Clear Filters, so the visible active-states never drift from
  // the actual filtering logic.
  function syncUIFromState() {
    var sortSelect = document.getElementById('po-sf-sort');
    if (sortSelect) sortSelect.value = state.sort;

    document.querySelectorAll('.po-filters .filter-btn').forEach(function (b) {
      b.classList.toggle('active', (b.getAttribute('data-filter') || 'all') === currentFilter);
    });
    document.querySelectorAll('#po-sf-visibility .sf-pill').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-value') === state.visibility);
    });
    document.querySelectorAll('#po-sf-type .sf-pill').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-value') === state.type);
    });
    var featBtn = document.getElementById('po-sf-featured');
    if (featBtn) featBtn.classList.toggle('active', state.featured);
    document.querySelectorAll('#po-sf-tags .sf-pill').forEach(function (b) {
      b.classList.toggle('active', state.tags.has(b.getAttribute('data-value')));
    });

    updateClearButtonVisibility();
  }

  function updateClearButtonVisibility() {
    var clearBtn = document.getElementById('po-sf-clear');
    if (!clearBtn) return;
    var isDefault = currentFilter === 'all' && state.sort === 'manual' &&
      state.visibility === 'all' && state.type === 'all' &&
      !state.featured && state.tags.size === 0;
    clearBtn.style.display = isDefault ? 'none' : '';
  }

  function resetAllFilters() {
    currentFilter = 'all';
    state.sort = 'manual';
    state.visibility = 'all';
    state.type = 'all';
    state.featured = false;
    state.tags = new Set();
    syncUIFromState();
  }

  // ── 4. applyView() — filter, sort, paginate, render ─────────────
  function applyView() {
    var cards = allCards();
    var matches = cards.filter(matchesFilters);
    matches.sort(compareFn(state.sort));

    cards.forEach(function (c) { c.style.display = 'none'; });

    // Physically reordering (not just hiding) is what actually
    // changes the visual grid order — CSS grid lays cards out by DOM
    // order, and moving an existing child relocates it without
    // losing anything already bound to it (reveal classes, read-more
    // buttons, permalink ids all stay intact). Non-matching cards are
    // simply left where they are since they're hidden anyway.
    var grid = document.querySelector('.po-replies-grid');
    if (grid) matches.forEach(function (c) { grid.appendChild(c); });

    matches.slice(0, visibleCount).forEach(function (c) { c.style.display = ''; });

    // loadMoreBtn.dataset.cmsHasText is set by cms-loader.js once the
    // "Load More Letters" button text field is known. If that field is
    // left blank in the dashboard, the button stays hidden forever —
    // no HTML-edit-required fallback text is ever shown.
    if (loadMoreBtn) {
      var hasText = loadMoreBtn.dataset.cmsHasText !== '0';
      loadMoreBtn.style.display = (hasText && matches.length > visibleCount) ? '' : 'none';
    }

    updateClearButtonVisibility();
  }

  // Jumps to, reveals (past any filter/sort/pagination hiding it),
  // and briefly highlights the letter named in the URL's
  // #reply-{slug} hash — what makes a copied/shared link actually
  // land somewhere, regardless of whatever filters were active.
  function goToHash() {
    var hash = location.hash;
    if (!/^#reply-/.test(hash)) return;
    var target = document.querySelector(hash);
    if (!target) return; // letters not rendered yet, or an unknown/old slug

    resetAllFilters();
    visibleCount = PAGE_SIZE;

    var matches = allCards().filter(matchesFilters);
    matches.sort(compareFn(state.sort));
    var idx = matches.indexOf(target);
    if (idx > -1 && idx + 1 > visibleCount) visibleCount = idx + 1;

    applyView();
    saveState();

    requestAnimationFrame(function () {
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      target.classList.add('reply-highlight');
      setTimeout(function () { target.classList.remove('reply-highlight'); }, 2200);
    });
  }

  // ── 5. Event wiring ──────────────────────────────────────────────
  document.addEventListener('click', function (e) {
    var filterBtn = e.target.closest('.po-filters .filter-btn');
    if (filterBtn) {
      document.querySelectorAll('.po-filters .filter-btn').forEach(function (b) { b.classList.remove('active'); });
      filterBtn.classList.add('active');
      currentFilter = filterBtn.getAttribute('data-filter') || 'all';
      visibleCount = PAGE_SIZE; // start each new filter from page one
      applyView();
      saveState();
      return;
    }

    if (e.target.closest('#po-load-more')) {
      visibleCount += PAGE_SIZE;
      applyView();
      return;
    }

    var sfToggle = e.target.closest('#po-sf-toggle');
    if (sfToggle) {
      var panel = document.getElementById('po-sf-panel');
      var willOpen = panel.hasAttribute('hidden');
      panel.hidden = !willOpen;
      sfToggle.classList.toggle('open', willOpen);
      sfToggle.setAttribute('aria-expanded', String(willOpen));
      return;
    }

    var visPill = e.target.closest('#po-sf-visibility .sf-pill');
    if (visPill) {
      document.querySelectorAll('#po-sf-visibility .sf-pill').forEach(function (b) { b.classList.remove('active'); });
      visPill.classList.add('active');
      state.visibility = visPill.getAttribute('data-value') || 'all';
      visibleCount = PAGE_SIZE;
      applyView();
      saveState();
      return;
    }

    var typePill = e.target.closest('#po-sf-type .sf-pill');
    if (typePill) {
      document.querySelectorAll('#po-sf-type .sf-pill').forEach(function (b) { b.classList.remove('active'); });
      typePill.classList.add('active');
      state.type = typePill.getAttribute('data-value') || 'all';
      visibleCount = PAGE_SIZE;
      applyView();
      saveState();
      return;
    }

    var featPill = e.target.closest('#po-sf-featured');
    if (featPill) {
      state.featured = !state.featured;
      featPill.classList.toggle('active', state.featured);
      visibleCount = PAGE_SIZE;
      applyView();
      saveState();
      return;
    }

    var tagPill = e.target.closest('#po-sf-tags .sf-pill');
    if (tagPill) {
      var val = tagPill.getAttribute('data-value');
      if (state.tags.has(val)) { state.tags.delete(val); tagPill.classList.remove('active'); }
      else { state.tags.add(val); tagPill.classList.add('active'); }
      visibleCount = PAGE_SIZE;
      applyView();
      saveState();
      return;
    }

    if (e.target.closest('#po-sf-clear')) {
      resetAllFilters();
      visibleCount = PAGE_SIZE;
      applyView();
      saveState();
      return;
    }

    // Clicking outside the open panel closes it — standard popover
    // convention, purely additive UX.
    var panelEl = document.getElementById('po-sf-panel');
    var toggleEl = document.getElementById('po-sf-toggle');
    if (panelEl && !panelEl.hidden && toggleEl &&
        !panelEl.contains(e.target) && !toggleEl.contains(e.target)) {
      panelEl.hidden = true;
      toggleEl.classList.remove('open');
      toggleEl.setAttribute('aria-expanded', 'false');
    }

    var permalink = e.target.closest('.reply-permalink');
    if (permalink) {
      e.preventDefault();
      // Setting location.hash both updates the address bar (so the
      // reader can copy it straight from there) and fires hashchange,
      // which goToHash() below uses to do the actual reveal/scroll.
      location.hash = permalink.getAttribute('href');
    }
  });

  document.addEventListener('change', function (e) {
    if (e.target && e.target.id === 'po-sf-sort') {
      state.sort = e.target.value;
      visibleCount = PAGE_SIZE;
      applyView();
      saveState();
    }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Escape') return;
    var panelEl = document.getElementById('po-sf-panel');
    var toggleEl = document.getElementById('po-sf-toggle');
    if (panelEl && !panelEl.hidden) {
      panelEl.hidden = true;
      if (toggleEl) { toggleEl.classList.remove('open'); toggleEl.setAttribute('aria-expanded', 'false'); }
    }
  });

  window.addEventListener('hashchange', goToHash);

  // The grid may still be empty when this script first runs (async
  // CMS fetch in progress) — do the initial pagination pass and hash
  // check only once cms-loader.js confirms the letters actually exist.
  // Build the dynamic filter UI (Letter Type / Tags / Craftie /
  // Featured) from what's actually published first, THEN restore any
  // saved session state on top of it, so a saved tag/type selection
  // still lands on a button that actually exists.
  document.addEventListener('cms:po-replies-rendered', function () {
    buildDynamicUI();
    loadState();
    syncUIFromState();
    applyView();
    goToHash();
  });

  // Page-content fields (like the Load More button's text) can finish
  // loading slightly before or after the letters themselves — re-run
  // the pagination view either way so the button's visibility always
  // reflects the latest CMS data.
  document.addEventListener('cms:po-page-rendered', function () {
    applyView();
  });
})();
</script>

<script src="nav.js" defer></script>
<script src="footer.js" defer></script>
<script src="cms-loader.js" defer></script>
