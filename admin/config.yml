# ────────────────────────────────────────────────────────────
# COLLECTION 10: HALL OF FAME
# ────────────────────────────────────────────────────────────

  - name: "hall_of_fame"
    label: "🏅 Hall of Fame"
    label_singular: "Hall of Fame Entry"
    folder: "content/hall-of-fame"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    summary: "{{reader_name}} — {{entry_type}} ({{status}})"
    description: >
      Your readers' wall. Feature the people who showed up for
      your stories — in letters, theories, art, reactions, and
      monthly spotlights. Everything here is curated by you.
    fields:
      - label: "Entry Type"
        name: "entry_type"
        widget: "select"
        options:
          - { label: "⭐ Featured Reader",     value: "featured_reader"   }
          - { label: "🎨 Fan Art Showcase",    value: "fan_art_showcase"  }
          - { label: "📅 Monthly Spotlight",   value: "monthly_spotlight" }
          - { label: "😭 Reaction Wall",       value: "reaction_wall"     }
          - { label: "🔍 Theorist Corner",     value: "theorist"          }
          - { label: "💌 Reader Letter",       value: "reader_letter"     }
        hint: "Choose what kind of Hall of Fame entry this is. Each type has its own display style on the website."
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft",     value: "draft"     }
          - { label: "Published", value: "published" }
          - { label: "Archived",  value: "archived"  }
        default: "draft"
      - label: "Pin to Top"
        name: "is_pinned"
        widget: "boolean"
        default: false
        hint: "Pinned entries always appear first, above all others. Use for your most treasured submissions."
      - label: "Date"
        name: "date"
        widget: "datetime"
        hint: "When this entry was added or when the spotlight is for."
      - label: "Reader Name or Handle"
        name: "reader_name"
        widget: "string"
        hint: "How they want to be known — real name, Wattpad handle, or anonymous."
      - label: "Reader Platform Handle"
        name: "reader_handle"
        widget: "string"
        required: false
        hint: "e.g. @raghav_simp_4ever — shown as a clickable credit."
      - label: "Platform"
        name: "platform"
        widget: "select"
        required: false
        options:
          - { label: "Wattpad", value: "wattpad" }
          - { label: "Instagram", value: "instagram" }
          - { label: "Twitter / X", value: "twitter" }
          - { label: "DeviantArt", value: "deviantart" }
          - { label: "Tumblr", value: "tumblr" }
          - { label: "Pinterest", value: "pinterest" }
          - { label: "Anonymous", value: "anonymous" }
          - { label: "Other", value: "other" }
      - label: "Reader Profile Link"
        name: "reader_profile_url"
        widget: "string"
        required: false
        hint: "Link to their Wattpad or Instagram profile, if they want to be credited."
      - label: "Related Book"
        name: "related_book"
        widget: "string"
        required: false
        hint: "Which book is this entry about? e.g. Amodini"
      - label: "Related Characters"
        name: "related_characters"
        widget: "list"
        required: false
        hint: "Which characters does this entry feature or mention?"
        field:
          label: "Character Name"
          name: "name"
          widget: "string"
      - label: "Display Name on Card"
        name: "display_name"
        widget: "string"
        required: false
      - label: "Author's Note About This Reader"
        name: "author_note_about_reader"
        widget: "text"
        required: false
      - label: "Reader Since"
        name: "reader_since"
        widget: "string"
        required: false
        hint: "Featured Reader only — e.g. Chapter 3, or Since 2023."
      - label: "Favourite Character"
        name: "favourite_character"
        widget: "string"
        required: false
      - label: "Favourite Scene or Chapter"
        name: "favourite_scene"
        widget: "string"
        required: false
        hint: "Featured Reader only — the moment that got them."
      - label: "Reader Photo or Avatar"
        name: "reader_image"
        widget: "image"
        required: false
        hint: "Featured Reader only — upload only with their permission."
        media_folder: "/public/images/hall-of-fame/readers"
        public_folder: "/images/hall-of-fame/readers"
      - label: "Artwork Title"
        name: "artwork_title"
        widget: "string"
        required: false
        hint: "Fan Art Showcase only — the name the artist gave this piece."
      - label: "Artwork Image"
        name: "artwork_image"
        widget: "image"
        required: false
        hint: "Fan Art Showcase only — upload the artwork file."
        media_folder: "/public/images/hall-of-fame/fan-art"
        public_folder: "/images/hall-of-fame/fan-art"
      - label: "Artwork External Link"
        name: "artwork_external_url"
        widget: "string"
        required: false
        hint: "Fan Art Showcase only — if the art is on Instagram or DeviantArt, paste the link here instead of or in addition to uploading."
      - label: "Artist's Description"
        name: "artist_description"
        widget: "text"
        required: false
        hint: "Fan Art Showcase only — what the artist said about their piece."
      - label: "Author's Reaction to the Art"
        name: "author_art_reaction"
        widget: "text"
        required: false
        hint: "Fan Art Showcase only — what did you feel when you first saw this?"
      - label: "Why You're Featuring This Letter"
        name: "author_feature_reason"
        widget: "text"
        required: false
        hint: "Reader Letter only — a short note from you about why this letter stayed with you."
      - label: "Theory Title"
        name: "theory_title"
        widget: "string"
        required: false
        hint: "Theorist Corner only — give their theory a title."
      - label: "Were They Right?"
        name: "theory_correct"
        widget: "select"
        required: false
        options:
          - { label: "✓ Exactly right",        value: "correct"    }
          - { label: "◑ Partially right",       value: "partial"    }
          - { label: "✗ Wrong but well argued", value: "wrong"      }
          - { label: "🔒 Not revealing yet",    value: "unrevealed" }
        hint: "Theorist Corner only — shown as a badge on their card."
      - label: "Author's Response to the Theory"
        name: "author_theory_response"
        widget: "text"
        required: false
        hint: "Theorist Corner only — respond to their theory."
      - label: "Spotlight Month"
        name: "spotlight_month"
        widget: "string"
        required: false
        hint: "e.g. June 2025"
      - label: "Why They Were Chosen"
        name: "spotlight_reason"
        widget: "markdown"
        required: false
        hint: "Monthly Spotlight only — write about why this reader earned the spotlight this month."
      - label: "Their Favourite Quote"
        name: "reader_favourite_quote"
        widget: "text"
        required: false
      - label: "Reaction Screenshot"
        name: "reaction_image"
        widget: "image"
        required: false
        hint: "Reaction Wall only — upload a screenshot of the reaction (DM, comment, story reply). Blur names if the reader prefers anonymity."
        media_folder: "/public/images/hall-of-fame/reactions"
        public_folder: "/images/hall-of-fame/reactions"
      - label: "Reaction Context"
        name: "reaction_context"
        widget: "string"
        required: false
        hint: "e.g. After Chapter 42 dropped."
      - label: "What This Reaction Meant to You"
        name: "author_reaction_note"
        widget: "text"
        required: false
      - label: "Letter Subject"
        name: "letter_subject"
        widget: "string"
        required: false
      - label: "Body Text"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Used for letter text, theory text, and reaction text."
      - label: "Permission to Feature"
        name: "has_permission"
        widget: "boolean"
        default: false
        hint: "Never publish without this switched on."
      - label: "Feature on Homepage"
        name: "is_homepage_feature"
        widget: "boolean"
        default: false
      - label: "Display Tags"
        name: "display_tags"
        widget: "list"
        required: false
        field:
          label: "Tag"
          name: "tag"
          widget: "string"

