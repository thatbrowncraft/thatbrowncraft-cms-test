# COLLECTION 14: HALL OF FAME (LEGACY — ARCHIVED)
# ────────────────────────────────────────────────────────────
# This is the old giant one-form-fits-all collection. It is kept
# here on purpose, not deleted, so every entry ever created stays
# visible and reachable in the dashboard, and so you can undo any
# of this by just deleting collections 10–13 above and turning
# `create: true` back on here. `create: false` just stops NEW
# entries from being added to this collection — it does not touch
# any file already saved in content/hall-of-fame/.
#
# All of its published entries have been copied (not moved) into
# the new collections above by the migration script. The original
# files in content/hall-of-fame/ are untouched. Once you've checked
# the new dashboards for a week or two and you're confident nothing
# is missing, you can delete this whole collection block (and, if
