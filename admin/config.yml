# ============================================================
# THATBROWNCRAFT — SVELTIA CMS CONFIGURATION
# File: admin/config.yml
# TEST REPO: thatbrowncraft/thatbrowncraft-cms-test
#
# Auth: Official Sveltia CMS Authenticator via Cloudflare Worker
# https://github.com/sveltia/sveltia-cms-auth
#
# Placeholders that need real values before this file is live:
#   PASTE_YOUR_WORKER_URL_HERE
#     → The URL of your deployed Cloudflare Worker
#       e.g. https://sveltia-cms-auth.YOUR-NAME.workers.dev
#
# Everything else is final and production-ready.
# All 10 collections, every widget, every field, every
# media folder, slug, summary, and commit message is preserved.
# ============================================================

backend:
  name: github
  repo: thatbrowncraft/thatbrowncraft-cms-test
  branch: main
  base_url: https://sveltia-cms-auth.that-browncraft.workers.dev
  commit_messages:
    create: "✦ New {{collection}}: {{slug}}"
    update: "✦ Updated {{collection}}: {{slug}}"
    delete: "✦ Deleted {{collection}}: {{slug}}"
    uploadMedia: "✦ Uploaded media: {{path}}"
    deleteMedia: "✦ Deleted media: {{path}}"

media_folder: "public/images"
public_folder: "/images"

# NOTE: publish_mode: editorial_workflow was removed.
# Sveltia CMS does not yet reliably commit media/asset uploads
# while an editorial workflow draft status is active — the upload
# request fails silently and the picker just resets with no file
# committed. Text entries save fine, which is why this only
# showed up as an image upload problem. Entries now save straight
# to `main`. Use each collection's existing Status field
# (Draft/Published) to control what's visible on the live site.

site_url: https://thatbrowncraft.github.io/thatbrowncraft-cms-test
display_url: https://thatbrowncraft.github.io/thatbrowncraft-cms-test

logo_url: /images/admin-logo.png

collections:

# ────────────────────────────────────────────────────────────
# COLLECTION 1: BOOKS
# ────────────────────────────────────────────────────────────

  - name: "books"
    label: "📚 Books"
    label_singular: "Book"
    folder: "content/books"
    create: true
    slug: "{{slug}}"
    preview_path: "books/{{slug}}"
    summary: "{{title}} — {{status}}"
    fields:
      - label: "Book Title"
        name: "title"
        widget: "string"
        hint: "The full title of the book exactly as you want it displayed."
      - label: "Series Name"
        name: "series_name"
        widget: "string"
        required: false
        hint: "e.g. Amodini Series"
      - label: "Series Number"
        name: "series_number"
        widget: "string"
        required: false
        hint: "e.g. Book 1, Book 2"
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft", value: "draft" }
          - { label: "Published", value: "published" }
          - { label: "Archived", value: "archived" }
        default: "draft"
      - label: "Feature on Homepage"
        name: "is_featured"
        widget: "boolean"
        default: false
        hint: "Turn on to show this book in the featured spot on your homepage."
      - label: "Book Cover"
        name: "cover_image"
        widget: "image"
        required: false
        hint: "Upload the book cover. Minimum 800×1200px recommended."
        media_folder: "/public/images/book-covers"
        public_folder: "/images/book-covers"
      - label: "Genres"
        name: "genres"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Romance"
          - "Drama"
          - "Family Saga"
          - "Desi"
          - "Slow Burn"
          - "Contemporary"
          - "Thriller"
          - "Emotional"
          - "Coming of Age"
        hint: "Select all that apply. You can choose multiple."
      - label: "Tropes"
        name: "tropes"
        widget: "list"
        required: false
        hint: "Add tropes one at a time — Arranged Marriage, Slow Burn, Found Family..."
        field:
          label: "Trope"
          name: "trope"
          widget: "string"
      - label: "Synopsis"
        name: "body"
        widget: "markdown"
        hint: "The main description readers see. Write freely — bold, italic, paragraphs all work."
        toolbar_buttons:
          - bold
          - italic
          - link
          - heading-two
          - heading-three
          - bulleted-list
          - numbered-list
      - label: "Author Note"
        name: "author_note"
        widget: "markdown"
        required: false
        hint: "A personal note from you to the readers. Optional but lovely."
      - label: "Featured Quote"
        name: "featured_quote"
        widget: "string"
        required: false
        hint: "One memorable line from this book — shown on the book card."
      - label: "Plot Timeline"
        name: "timeline"
        widget: "list"
        required: false
        hint: "Add story beats one at a time. Readers see these as a visual timeline."
        field:
          label: "Timeline Entry"
          name: "entry"
          widget: "string"
      - label: "Favourite Quotes"
        name: "quotes"
        widget: "list"
        required: false
        hint: "Memorable lines from this book. Add as many as you want."
        fields:
          - label: "Quote Text"
            name: "text"
            widget: "string"
          - label: "Context"
            name: "context"
            widget: "string"
            required: false
            hint: "e.g. Chapter 12, after the rain scene"
      - label: "Lead Characters"
        name: "character_leads"
        widget: "list"
        required: false
        hint: "Type the names of the lead characters for this book."
        field:
          label: "Character Name"
          name: "name"
          widget: "string"
      - label: "Purchase / Reading Links"
        name: "purchase_links"
        widget: "list"
        required: false
        hint: "Add one entry per place readers can find this book — Amazon Kindle, Amazon Paperback, Wattpad, Pothi, Goodreads, Kobo, Notion Press, Inkitt, Stck, or any future platform. Only the platforms you add here will show as buttons on the book page. Drag to reorder — the first one becomes the highlighted button."
        fields:
          - label: "Platform Name"
            name: "platform"
            widget: "string"
            hint: "Shown as the button text, e.g. Amazon Kindle, Paperback, Wattpad, Pothi, Goodreads, Kobo, Notion Press"
          - label: "Link URL"
            name: "url"
            widget: "string"
            hint: "Full URL — https://..."
          - label: "Icon (optional)"
            name: "icon"
            widget: "string"
            required: false
            hint: "An emoji for the button, e.g. 📖 or 📦. Leave blank to use a sensible default for well-known platforms."
      - label: "Book Gallery"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Upload aesthetic images, moodboards, or promotional art for this book."
        fields:
          - label: "Image"
            name: "image"
            widget: "image"
            media_folder: "/public/images/book-gallery"
            public_folder: "/images/book-gallery"
          - label: "Caption"
            name: "caption"
            widget: "string"
            required: false
      - label: "Publication Date"
        name: "published_at"
        widget: "datetime"
        required: false
        hint: "When did this book go live? Used for sorting."

# ────────────────────────────────────────────────────────────
# COLLECTION 2: CHARACTERS
# ────────────────────────────────────────────────────────────

  - name: "characters"
    label: "🌸 Characters"
    label_singular: "Character"
    folder: "content/characters"
    create: true
    slug: "{{slug}}"
    preview_path: "characters/{{slug}}"
    summary: "{{name}} — {{book}} ({{status}})"
    fields:
      - label: "Character Name"
        name: "name"
        widget: "string"
      - label: "Book"
        name: "book"
        widget: "string"
        hint: "Which book does this character belong to? e.g. Amodini"
      - label: "Role"
        name: "role"
        widget: "select"
        options:
          - { label: "Lead", value: "lead" }
          - { label: "Supporting", value: "supporting" }
          - { label: "Minor", value: "minor" }
        default: "lead"
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft", value: "draft" }
          - { label: "Published", value: "published" }
        default: "draft"
      - label: "Feature in Character Vault"
        name: "is_featured"
        widget: "boolean"
        default: true
      - label: "Display Order"
        name: "display_order"
        widget: "number"
        default: 1
        hint: "Controls the order characters appear. 1 shows first."
      - label: "Character Illustration"
        name: "illustration"
        widget: "image"
        required: false
        hint: "The main character illustration. PNG with transparency works best."
        media_folder: "/public/images/character-illustrations"
        public_folder: "/images/character-illustrations"
      - label: "Age"
        name: "age"
        widget: "string"
        required: false
      - label: "Occupation"
        name: "occupation"
        widget: "string"
        required: false
      - label: "Personality"
        name: "body"
        widget: "markdown"
        hint: "Describe their personality in depth. This is what readers see on the character page."
      - label: "Author Note"
        name: "author_note"
        widget: "markdown"
        required: false
        hint: "Your private thoughts about this character — what inspired them, what they mean to you."
      - label: "Likes"
        name: "likes"
        widget: "list"
        required: false
        hint: "Add one like at a time — Chai, Early mornings, Silence..."
        field:
          label: "Like"
          name: "item"
          widget: "string"
      - label: "Dislikes"
        name: "dislikes"
        widget: "list"
        required: false
        field:
          label: "Dislike"
          name: "item"
          widget: "string"
      - label: "Trivia"
        name: "trivia"
        widget: "list"
        required: false
        hint: "Fun facts about this character. Readers love these."
        field:
          label: "Trivia Fact"
          name: "fact"
          widget: "string"
      - label: "Theme Song"
        name: "theme_song"
        widget: "string"
        required: false
        hint: "Song Name — Artist Name"
      - label: "Character Playlist Link"
        name: "playlist_url"
        widget: "string"
        required: false
        hint: "Spotify or YouTube playlist for this character"
      - label: "Relationship Map"
        name: "relationship_map"
        widget: "image"
        required: false
        hint: "Upload a relationship map or family tree image."
        media_folder: "/public/images/character-maps"
        public_folder: "/images/character-maps"
      - label: "Character Gallery"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Upload multiple images — aesthetics, moodboards, fan interpretations."
        fields:
          - label: "Image"
            name: "image"
            widget: "image"
            media_folder: "/public/images/character-gallery"
            public_folder: "/images/character-gallery"
          - label: "Caption"
            name: "caption"
            widget: "string"
            required: false

# ────────────────────────────────────────────────────────────
# COLLECTION 3: BONUS SCENES
# ────────────────────────────────────────────────────────────

  - name: "bonus_scenes"
    label: "📖 Bonus Scenes"
    label_singular: "Bonus Scene"
    folder: "content/bonus-scenes"
    create: true
    slug: "{{slug}}"
    preview_path: "bonus/{{slug}}"
    summary: "{{title}} ({{scene_type}}) — {{status}}"
    fields:
      - label: "Scene Title"
        name: "title"
        widget: "string"
      - label: "Scene Type"
        name: "scene_type"
        widget: "select"
        options:
          - { label: "Bonus Scene",        value: "bonus_scene"        }
          - { label: "Deleted Scene",       value: "deleted_scene"      }
          - { label: "Character POV",       value: "character_pov"      }
          - { label: "Festival Special",    value: "festival_special"   }
          - { label: "Birthday Special",    value: "birthday_special"   }
          - { label: "Letter",              value: "letter"             }
          - { label: "Mini Story",          value: "mini_story"         }
          - { label: "Alternative Ending",  value: "alternative_ending" }
        default: "bonus_scene"
      - label: "Related Book"
        name: "book"
        widget: "string"
        hint: "Which book does this scene belong to? e.g. Amodini"
      - label: "Characters Featured"
        name: "characters"
        widget: "list"
        required: false
        hint: "Who appears in this scene? e.g. Raghav, Sree"
        field:
          label: "Character"
          name: "name"
          widget: "string"
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft",     value: "draft"     }
          - { label: "Published", value: "published" }
        default: "draft"
      - label: "Publish Date"
        name: "published_at"
        widget: "datetime"
        required: false
        hint: "When did or will this scene go live?"
      - label: "Teaser Excerpt"
        name: "teaser"
        widget: "text"
        hint: "The short preview readers see on the card before clicking to read. 2–3 sentences max."
      - label: "Full Scene"
        name: "body"
        widget: "markdown"
        hint: "Write or paste the complete scene here. All formatting is supported."
      - label: "Author Note"
        name: "author_note"
        widget: "markdown"
        required: false
        hint: "Optional note about why you wrote this scene, what it means, what to look for."
      - label: "Scene Images"
        name: "images"
        widget: "list"
        required: false
        fields:
          - label: "Image"
            name: "image"
            widget: "image"
            media_folder: "/public/images/bonus-scenes"
            public_folder: "/images/bonus-scenes"
          - label: "Caption"
            name: "caption"
            widget: "string"
            required: false
      - label: "PDF Version"
        name: "pdf_url"
        widget: "file"
        required: false
        hint: "Optional PDF version of this scene."
        media_folder: "/public/files"
        public_folder: "/files"

# ────────────────────────────────────────────────────────────
# COLLECTION 4: KANHA'S COURTYARD
# ────────────────────────────────────────────────────────────

  - name: "kanha"
    label: "🪈 Kanha's Courtyard"
    label_singular: "Courtyard Entry"
    folder: "content/kanha"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} ({{entry_type}})"
    fields:
      - label: "Entry Title"
        name: "title"
        widget: "string"
        hint: "A short title for this entry — shown in the dashboard list."
      - label: "Entry Type"
        name: "entry_type"
        widget: "select"
        options:
          - { label: "Verse",       value: "verse"       }
          - { label: "Reflection",  value: "reflection"  }
          - { label: "Life Lesson", value: "life_lesson" }
          - { label: "Quote",       value: "quote"       }
          - { label: "Illustration",value: "illustration"}
        default: "verse"
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft",     value: "draft"     }
          - { label: "Published", value: "published" }
        default: "draft"
      - label: "Feature on Homepage"
        name: "is_featured"
        widget: "boolean"
        default: false
        hint: "Show this verse in the rotating Kanha quote on the homepage."
      - label: "Display Order"
        name: "display_order"
        widget: "number"
        default: 1
        hint: "Lower numbers appear first."
      - label: "Gita Chapter"
        name: "gita_chapter"
        widget: "select"
        required: false
        options:
          - { label: "Chapter 1",  value: 1  }
          - { label: "Chapter 2",  value: 2  }
          - { label: "Chapter 3",  value: 3  }
          - { label: "Chapter 4",  value: 4  }
          - { label: "Chapter 5",  value: 5  }
          - { label: "Chapter 6",  value: 6  }
          - { label: "Chapter 7",  value: 7  }
          - { label: "Chapter 8",  value: 8  }
          - { label: "Chapter 9",  value: 9  }
          - { label: "Chapter 10", value: 10 }
          - { label: "Chapter 11", value: 11 }
          - { label: "Chapter 12", value: 12 }
          - { label: "Chapter 13", value: 13 }
          - { label: "Chapter 14", value: 14 }
          - { label: "Chapter 15", value: 15 }
          - { label: "Chapter 16", value: 16 }
          - { label: "Chapter 17", value: 17 }
          - { label: "Chapter 18", value: 18 }
      - label: "Chapter Name"
        name: "chapter_name"
        widget: "string"
        required: false
        hint: "e.g. Sankhya Yoga — auto-filled above but you can edit."
      - label: "Sanskrit Text"
        name: "sanskrit_text"
        widget: "string"
        required: false
        hint: "The original Sanskrit verse, if applicable."
      - label: "English Meaning"
        name: "english_meaning"
        widget: "string"
        required: false
        hint: "A faithful English translation of the verse."
      - label: "Short Pull Quote"
        name: "pull_quote"
        widget: "string"
        required: false
        hint: "A short version shown on the card — the line that stops people scrolling."
      - label: "Reflection"
        name: "body"
        widget: "markdown"
        hint: "Your personal reflection on this verse. Human, warm, non-preachy. This is the heart of Kanha's Courtyard."
      - label: "Illustration"
        name: "illustration"
        widget: "image"
        required: false
        hint: "An optional illustration for this entry."
        media_folder: "/public/images/kanha-illustrations"
        public_folder: "/images/kanha-illustrations"

# ────────────────────────────────────────────────────────────
# COLLECTION 5: AUTHOR UPDATES
# ────────────────────────────────────────────────────────────

  - name: "updates"
    label: "📝 Author Updates"
    label_singular: "Update"
    folder: "content/updates"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "updates/{{slug}}"
    summary: "{{title}} — {{update_type}} ({{status}})"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Announcement", value: "announcement" }
          - { label: "Writing Update", value: "writing_update" }
          - { label: "Behind the Scenes", value: "behind_the_scenes" }
          - { label: "Personal", value: "personal" }
          - { label: "General", value: "general" }
        default: "general"
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft",     value: "draft"     }
          - { label: "Published", value: "published" }
        default: "draft"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        hint: "Controls the date shown and sort order."
      - label: "Cover Image"
        name: "cover_image"
        widget: "image"
        required: false
        media_folder: "/public/images/update-covers"
        public_folder: "/images/update-covers"
      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "Short preview shown in the updates feed. 1–2 sentences."
      - label: "Full Post"
        name: "body"
        widget: "markdown"
        hint: "Write your full update here. Think of it like a blog post."
      - label: "Update Type"
        name: "update_type"
        widget: "select"
        required: false
        options:
          - { label: "📖 New Chapter",     value: "chapter"   }
          - { label: "✨ Bonus Scene",      value: "bonus"     }
          - { label: "🏆 Milestone",        value: "milestone" }
          - { label: "✍️ Author Note",      value: "note"      }
          - { label: "📦 Paperback",        value: "paperback" }
          - { label: "🌟 Character Reveal", value: "reveal"    }
          - { label: "🎵 New Playlist",     value: "playlist"  }
          - { label: "🎉 Reader Event",     value: "event"     }
          - { label: "🌿 Writing Break",    value: "break"     }
      - label: "Pin to Top"
        name: "is_pinned"
        widget: "boolean"
        default: false
      - label: "Button Label"
        name: "link_label"
        widget: "string"
        required: false
        hint: "e.g. Read on Wattpad, Get your copy. Leave blank for no button."
      - label: "Button URL"
        name: "link_url"
        widget: "string"
        required: false

# ────────────────────────────────────────────────────────────
# COLLECTION 6: FEATURED REVIEWS
# ────────────────────────────────────────────────────────────

  - name: "featured_reviews"
    label: "⭐ Featured Reviews"
    label_singular: "Review"
    folder: "content/featured-reviews"
    create: true
    slug: "{{slug}}"
    summary: "{{reader_name}} — {{book}} ({{rating}} stars)"
    fields:
      - label: "Reader Name"
        name: "reader_name"
        widget: "string"
      - label: "Reader Handle"
        name: "reader_handle"
        widget: "string"
        required: false
        hint: "Their Wattpad or Instagram handle — e.g. @raghav_simp"
      - label: "Book"
        name: "book"
        widget: "string"
        hint: "Which book is this review for?"
      - label: "Rating"
        name: "rating"
        widget: "select"
        options:
          - { label: "★★★★★ — 5 stars", value: 5 }
          - { label: "★★★★ — 4 stars",  value: 4 }
          - { label: "★★★ — 3 stars",   value: 3 }
          - { label: "★★ — 2 stars",    value: 2 }
          - { label: "★ — 1 star",      value: 1 }
        default: 5
      - label: "Review Text"
        name: "body"
        widget: "markdown"
        hint: "Paste the reader's review here exactly as they wrote it."
      - label: "Contains Spoilers"
        name: "contains_spoilers"
        widget: "boolean"
        default: false
        hint: "Turn on to show a spoiler warning on this review."
      - label: "Pin This Review"
        name: "is_pinned"
        widget: "boolean"
        default: false
        hint: "Pinned reviews always appear at the top."
      - label: "Date"
        name: "date"
        widget: "datetime"

# ────────────────────────────────────────────────────────────
# COLLECTION 7: FEATURED FAN ART
# ────────────────────────────────────────────────────────────

  - name: "fan_art"
    label: "🎨 Featured Fan Art"
    label_singular: "Fan Art"
    folder: "content/fan-art"
    create: true
    slug: "{{slug}}"
    summary: "{{artist_name}} — {{book_or_character}}"
    fields:
      - label: "Artist Name"
        name: "artist_name"
        widget: "string"
      - label: "Artist Handle"
        name: "artist_handle"
        widget: "string"
        required: false
        hint: "e.g. @nightinkbrushes"
      - label: "Platform"
        name: "platform"
        widget: "string"
        required: false
        hint: "Where to find them — Instagram, Twitter, DeviantArt..."
      - label: "Book or Character"
        name: "book_or_character"
        widget: "string"
        hint: "What does this art depict? e.g. Raghav & Sree, Amodini"
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
        hint: "The artist's own description of their work."
      - label: "Artwork Image"
        name: "image"
        widget: "image"
        required: false
        hint: "Upload the fan art file. Get permission from the artist first."
        media_folder: "/public/images/fan-art"
        public_folder: "/images/fan-art"
      - label: "External Link"
        name: "external_link"
        widget: "string"
        required: false
        hint: "If art is on Instagram/DeviantArt, paste the link here instead of uploading."
      - label: "Feature This Piece"
        name: "is_featured"
        widget: "boolean"
        default: true
      - label: "Date"
        name: "date"
        widget: "datetime"

# ────────────────────────────────────────────────────────────
# COLLECTION 8: LINKTREE LINKS
# ────────────────────────────────────────────────────────────

  - name: "links"
    label: "🔗 Linktree Links"
    files:
      - label: "All Links"
        name: "linktree"
        file: "content/settings/links.md"
        fields:
          - label: "QR Code Image"
            name: "qr_image"
            widget: "image"
            required: false
            media_folder: "/public/images/qr"
            public_folder: "/images/qr"
          - label: "QR Code Label"
            name: "qr_label"
            widget: "string"
            required: false
            default: "Scan to find the whole universe."
          - label: "Show QR Section"
            name: "qr_show"
            widget: "boolean"
            default: true
          - label: "Links"
            name: "links"
            widget: "list"
            hint: "Drag to reorder. Order here = order readers see."
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
                hint: "e.g. Wattpad, Instagram, Buy the Book"
              - label: "URL"
                name: "url"
                widget: "string"
                hint: "Full URL including https://"
              - label: "Icon or Emoji"
                name: "icon"
                widget: "string"
                hint: "An emoji that represents this link — 📖 📸 🎵 🛒"
              - label: "Category"
                name: "category"
                widget: "select"
                required: false
                options:
                  - { label: "Reading", value: "reading" }
                  - { label: "Social", value: "social" }
                  - { label: "Shopping", value: "shopping" }
                  - { label: "Contact", value: "contact" }
                  - { label: "General", value: "general" }
              - label: "Show on Website"
                name: "is_active"
                widget: "boolean"
                default: true
                hint: "Toggle off to hide this link without deleting it."
              - label: "Short Description"
                name: "description"
                widget: "string"
                required: false
                hint: "One line under the platform name — e.g. Where stories first learn to breathe."

