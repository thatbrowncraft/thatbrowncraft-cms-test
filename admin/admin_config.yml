# ============================================================
# THATBROWNCRAFT — DECAP CMS CONFIGURATION
# File: admin/config.yml
#
# This file is the brain of your entire admin dashboard.
# It defines every collection, every field, and every option
# you see when you log into thatbrowncraft.com/admin
#
# DO NOT edit this file manually unless you know what you're
# doing. All content is managed through the dashboard.
# ============================================================


# ============================================================
# BACKEND — connects Decap to your GitHub repository
# ============================================================

backend:
  name: git-gateway                    # Netlify's Git Gateway — handles auth
  branch: main                         # Your main GitHub branch
  commit_messages:
    create: "✦ New {{collection}}: {{slug}}"
    update: "✦ Updated {{collection}}: {{slug}}"
    delete: "✦ Deleted {{collection}}: {{slug}}"
    uploadMedia: "✦ Uploaded media: {{path}}"
    deleteMedia: "✦ Deleted media: {{path}}"


# ============================================================
# MEDIA — where uploaded images and files are stored
# ============================================================

media_folder: "public/images"          # Where files are saved in GitHub
public_folder: "/images"               # The public URL prefix for images


# ============================================================
# EDITORIAL WORKFLOW
# Enables Draft → In Review → Published stages
# ============================================================

publish_mode: editorial_workflow


# ============================================================
# SITE URL
# ============================================================

site_url: https://thatbrowncraft.netlify.app   # Update after Netlify deploy
display_url: https://thatbrowncraft.com        # Update after custom domain


# ============================================================
# LOGO (shows on the admin login screen)
# ============================================================

logo_url: /images/admin-logo.png       # Upload your logo here later


# ============================================================
# COLLECTIONS
# Each collection is a content type.
# List collections = one file per entry (books, characters...)
# File collections = one file for everything (settings, links)
# ============================================================

collections:


# ────────────────────────────────────────────────────────────
# COLLECTION 1: BOOKS
# ────────────────────────────────────────────────────────────

  - name: "books"
    label: "📚 Books"
    label_singular: "Book"
    folder: "content/books"
    create: true
    slug: "{{slug}}"                   # filename = book title as slug
    preview_path: "books/{{slug}}"     # preview link on public site
    summary: "{{title}} — {{status}}"

    fields:

      # ── Core Info ──────────────────────────────────────────
      - label: "Book Title"
        name: "title"
        widget: "string"
        hint: "The full title of the book exactly as you want it displayed."

      - label: "Series Name"
        name: "series_name"
        widget: "string"
        required: false
        hint: "e.g. Amodini Series"

      - label: "Series Number"
        name: "series_number"
        widget: "string"
        required: false
        hint: "e.g. Book 1, Book 2"

      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft — only you can see this", value: "draft" }
          - { label: "Published — visible to readers", value: "published" }
          - { label: "Archived — hidden from site", value: "archived" }
        default: "draft"

      - label: "Feature on Homepage"
        name: "is_featured"
        widget: "boolean"
        default: false
        hint: "Turn on to show this book in the featured spot on your homepage."

      # ── Cover Image ────────────────────────────────────────
      - label: "Book Cover"
        name: "cover_image"
        widget: "image"
        required: false
        hint: "Upload the book cover. Minimum 800×1200px recommended."
        media_folder: "/public/images/book-covers"
        public_folder: "/images/book-covers"

      # ── About the Book ─────────────────────────────────────
      - label: "Genres"
        name: "genres"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Romance"
          - "Drama"
          - "Family Saga"
          - "Desi"
          - "Slow Burn"
          - "Contemporary"
          - "Thriller"
          - "Emotional"
          - "Coming of Age"
        hint: "Select all that apply. You can choose multiple."

      - label: "Tropes"
        name: "tropes"
        widget: "list"
        required: false
        hint: "Add tropes one at a time — Arranged Marriage, Slow Burn, Found Family..."
        field:
          label: "Trope"
          name: "trope"
          widget: "string"

      - label: "Synopsis"
        name: "body"
        widget: "markdown"
        hint: "The main description readers see. Write freely — bold, italic, paragraphs all work."
        toolbar_buttons:
          - bold
          - italic
          - link
          - heading-two
          - heading-three
          - bulleted-list
          - numbered-list

      - label: "Author Note"
        name: "author_note"
        widget: "markdown"
        required: false
        hint: "A personal note from you to the readers. Optional but lovely."

      - label: "Featured Quote"
        name: "featured_quote"
        widget: "string"
        required: false
        hint: "One memorable line from this book — shown on the book card."

      # ── Plot Timeline ──────────────────────────────────────
      - label: "Plot Timeline"
        name: "timeline"
        widget: "list"
        required: false
        hint: "Add story beats one at a time. Readers see these as a visual timeline."
        field:
          label: "Timeline Entry"
          name: "entry"
          widget: "string"

      # ── Quotes ─────────────────────────────────────────────
      - label: "Favourite Quotes"
        name: "quotes"
        widget: "list"
        required: false
        hint: "Memorable lines from this book. Add as many as you want."
        fields:
          - label: "Quote Text"
            name: "text"
            widget: "string"
          - label: "Context (optional)"
            name: "context"
            widget: "string"
            required: false
            hint: "e.g. Chapter 12, after the rain scene"

      # ── Character Leads ────────────────────────────────────
      - label: "Lead Characters"
        name: "character_leads"
        widget: "list"
        required: false
        hint: "Type the names of the lead characters for this book."
        field:
          label: "Character Name"
          name: "name"
          widget: "string"

      # ── Reading Links ──────────────────────────────────────
      - label: "Wattpad Link"
        name: "wattpad_url"
        widget: "string"
        required: false
        hint: "Full URL — https://wattpad.com/..."

      - label: "Kindle Link"
        name: "kindle_url"
        widget: "string"
        required: false

      - label: "Paperback Link"
        name: "paperback_url"
        widget: "string"
        required: false

      - label: "Inkitt Link"
        name: "inkitt_url"
        widget: "string"
        required: false

      - label: "Stck Link"
        name: "stck_url"
        widget: "string"
        required: false

      # ── Gallery ────────────────────────────────────────────
      - label: "Book Gallery"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Upload aesthetic images, moodboards, or promotional art for this book."
        fields:
          - label: "Image"
            name: "image"
            widget: "image"
            media_folder: "/public/images/book-gallery"
            public_folder: "/images/book-gallery"
          - label: "Caption (optional)"
            name: "caption"
            widget: "string"
            required: false

      # ── Metadata ───────────────────────────────────────────
      - label: "Publication Date"
        name: "published_at"
        widget: "datetime"
        required: false
        hint: "When did this book go live? Used for sorting."


# ────────────────────────────────────────────────────────────
# COLLECTION 2: CHARACTERS
# ────────────────────────────────────────────────────────────

  - name: "characters"
    label: "🌸 Characters"
    label_singular: "Character"
    folder: "content/characters"
    create: true
    slug: "{{slug}}"
    preview_path: "characters/{{slug}}"
    summary: "{{name}} — {{book}} ({{status}})"

    fields:

      - label: "Character Name"
        name: "name"
        widget: "string"

      - label: "Book"
        name: "book"
        widget: "string"
        hint: "Which book does this character belong to? e.g. Amodini"

      - label: "Role"
        name: "role"
        widget: "select"
        options:
          - { label: "Lead", value: "lead" }
          - { label: "Supporting", value: "supporting" }
          - { label: "Minor", value: "minor" }
        default: "lead"

      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft", value: "draft" }
          - { label: "Published", value: "published" }
        default: "draft"

      - label: "Feature in Character Vault"
        name: "is_featured"
        widget: "boolean"
        default: true

      - label: "Display Order"
        name: "display_order"
        widget: "number"
        default: 1
        hint: "Controls the order characters appear. 1 shows first."

      # ── Illustration ───────────────────────────────────────
      - label: "Character Illustration"
        name: "illustration"
        widget: "image"
        required: false
        hint: "The main character illustration. PNG with transparency works best."
        media_folder: "/public/images/character-illustrations"
        public_folder: "/images/character-illustrations"

      # ── Profile ────────────────────────────────────────────
      - label: "Age"
        name: "age"
        widget: "string"
        required: false

      - label: "Occupation"
        name: "occupation"
        widget: "string"
        required: false

      - label: "Personality"
        name: "body"
        widget: "markdown"
        hint: "Describe their personality in depth. This is what readers see on the character page."

      - label: "Author Note"
        name: "author_note"
        widget: "markdown"
        required: false
        hint: "Your private thoughts about this character — what inspired them, what they mean to you."

      # ── Personality Details ────────────────────────────────
      - label: "Likes"
        name: "likes"
        widget: "list"
        required: false
        hint: "Add one like at a time — Chai, Early mornings, Silence..."
        field:
          label: "Like"
          name: "item"
          widget: "string"

      - label: "Dislikes"
        name: "dislikes"
        widget: "list"
        required: false
        field:
          label: "Dislike"
          name: "item"
          widget: "string"

      - label: "Trivia"
        name: "trivia"
        widget: "list"
        required: false
        hint: "Fun facts about this character. Readers love these."
        field:
          label: "Trivia Fact"
          name: "fact"
          widget: "string"

      # ── Music ──────────────────────────────────────────────
      - label: "Theme Song"
        name: "theme_song"
        widget: "string"
        required: false
        hint: "Song Name — Artist Name"

      - label: "Character Playlist Link"
        name: "playlist_url"
        widget: "string"
        required: false
        hint: "Spotify or YouTube playlist for this character"

      # ── Visuals ────────────────────────────────────────────
      - label: "Relationship Map"
        name: "relationship_map"
        widget: "image"
        required: false
        hint: "Upload a relationship map or family tree image."
        media_folder: "/public/images/character-maps"
        public_folder: "/images/character-maps"

      - label: "Character Gallery"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Upload multiple images — aesthetics, moodboards, fan interpretations."
        fields:
          - label: "Image"
            name: "image"
            widget: "image"
            media_folder: "/public/images/character-gallery"
            public_folder: "/images/character-gallery"
          - label: "Caption"
            name: "caption"
            widget: "string"
            required: false


# ────────────────────────────────────────────────────────────
# COLLECTION 3: BONUS SCENES (One More Chapter)
# ────────────────────────────────────────────────────────────

  - name: "bonus_scenes"
    label: "📖 Bonus Scenes"
    label_singular: "Bonus Scene"
    folder: "content/bonus-scenes"
    create: true
    slug: "{{slug}}"
    preview_path: "bonus/{{slug}}"
    summary: "{{title}} ({{scene_type}}) — {{status}}"

    fields:

      - label: "Scene Title"
        name: "title"
        widget: "string"

      - label: "Scene Type"
        name: "scene_type"
        widget: "select"
        options:
          - { label: "Bonus Scene", value: "bonus_scene" }
          - { label: "Deleted Scene", value: "deleted_scene" }
          - { label: "Character POV", value: "character_pov" }
          - { label: "Festival Special", value: "festival_special" }
          - { label: "Birthday Special", value: "birthday_special" }
          - { label: "Letter", value: "letter" }
          - { label: "Mini Story", value: "mini_story" }
          - { label: "Alternative Ending", value: "alternative_ending" }
        default: "bonus_scene"

      - label: "Related Book"
        name: "book"
        widget: "string"
        hint: "Which book does this scene belong to? e.g. Amodini"

      - label: "Characters Featured"
        name: "characters"
        widget: "list"
        required: false
        hint: "Who appears in this scene? e.g. Raghav, Sree"
        field:
          label: "Character"
          name: "name"
          widget: "string"

      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft — invisible to readers", value: "draft" }
          - { label: "Published — readers can read this", value: "published" }
        default: "draft"

      - label: "Publish Date"
        name: "published_at"
        widget: "datetime"
        required: false
        hint: "When did or will this scene go live?"

      # ── Content ────────────────────────────────────────────
      - label: "Teaser Excerpt"
        name: "teaser"
        widget: "text"
        hint: "The short preview readers see on the card before clicking to read. 2–3 sentences max."

      - label: "Full Scene"
        name: "body"
        widget: "markdown"
        hint: "Write or paste the complete scene here. All formatting is supported."

      - label: "Author Note"
        name: "author_note"
        widget: "text"
        required: false
        hint: "Optional note about why you wrote this scene, what it means, what to look for."

      # ── Attachments ────────────────────────────────────────
      - label: "Scene Images"
        name: "images"
        widget: "list"
        required: false
        fields:
          - label: "Image"
            name: "image"
            widget: "image"
            media_folder: "/public/images/bonus-scenes"
            public_folder: "/images/bonus-scenes"
          - label: "Caption"
            name: "caption"
            widget: "string"
            required: false

      - label: "PDF Version"
        name: "pdf_url"
        widget: "file"
        required: false
        hint: "Optional PDF version of this scene."
        media_folder: "/public/files"
        public_folder: "/files"


# ────────────────────────────────────────────────────────────
# COLLECTION 4: KANHA'S COURTYARD
# ────────────────────────────────────────────────────────────

  - name: "kanha"
    label: "🪈 Kanha's Courtyard"
    label_singular: "Courtyard Entry"
    folder: "content/kanha"
    create: true
    slug: "{{slug}}"
    summary: "Chapter {{gita_chapter}} — {{title}} ({{entry_type}})"

    fields:

      - label: "Entry Title"
        name: "title"
        widget: "string"
        hint: "A short title for this entry — shown in the dashboard list."

      - label: "Entry Type"
        name: "entry_type"
        widget: "select"
        options:
          - { label: "Verse", value: "verse" }
          - { label: "Reflection", value: "reflection" }
          - { label: "Life Lesson", value: "life_lesson" }
          - { label: "Quote", value: "quote" }
          - { label: "Illustration", value: "illustration" }
        default: "verse"

      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft", value: "draft" }
          - { label: "Published", value: "published" }
        default: "draft"

      - label: "Feature on Homepage"
        name: "is_featured"
        widget: "boolean"
        default: false
        hint: "Show this verse in the rotating Kanha quote on the homepage."

      - label: "Display Order"
        name: "display_order"
        widget: "number"
        default: 1
        hint: "Lower numbers appear first."

      # ── Gita Reference ─────────────────────────────────────
      - label: "Gita Chapter"
        name: "gita_chapter"
        widget: "select"
        required: false
        options:
          - { label: "Chapter 1 — Arjuna Vishada Yoga", value: 1 }
          - { label: "Chapter 2 — Sankhya Yoga", value: 2 }
          - { label: "Chapter 3 — Karma Yoga", value: 3 }
          - { label: "Chapter 4 — Jnana Yoga", value: 4 }
          - { label: "Chapter 5 — Karma Vairagya Yoga", value: 5 }
          - { label: "Chapter 6 — Dhyana Yoga", value: 6 }
          - { label: "Chapter 7 — Jnana Vijnana Yoga", value: 7 }
          - { label: "Chapter 8 — Akshara Brahma Yoga", value: 8 }
          - { label: "Chapter 9 — Raja Vidya Yoga", value: 9 }
          - { label: "Chapter 10 — Vibhuti Yoga", value: 10 }
          - { label: "Chapter 11 — Vishwarupa Darshana Yoga", value: 11 }
          - { label: "Chapter 12 — Bhakti Yoga", value: 12 }
          - { label: "Chapter 13 — Kshetra Kshetrajna Vibhaga Yoga", value: 13 }
          - { label: "Chapter 14 — Gunatraya Vibhaga Yoga", value: 14 }
          - { label: "Chapter 15 — Purushottama Yoga", value: 15 }
          - { label: "Chapter 16 — Daivasura Sampad Vibhaga Yoga", value: 16 }
          - { label: "Chapter 17 — Shraddhatraya Vibhaga Yoga", value: 17 }
          - { label: "Chapter 18 — Moksha Yoga", value: 18 }

      - label: "Chapter Name"
        name: "chapter_name"
        widget: "string"
        required: false
        hint: "e.g. Sankhya Yoga — auto-filled above but you can edit."

      # ── Content ────────────────────────────────────────────
      - label: "Sanskrit Text"
        name: "sanskrit_text"
        widget: "string"
        required: false
        hint: "The original Sanskrit verse, if applicable."

      - label: "English Meaning"
        name: "english_meaning"
        widget: "string"
        required: false
        hint: "A faithful English translation of the verse."

      - label: "Short Pull Quote"
        name: "pull_quote"
        widget: "string"
        required: false
        hint: "A short version shown on the card — the line that stops people scrolling."

      - label: "Reflection"
        name: "body"
        widget: "markdown"
        hint: "Your personal reflection on this verse. Human, warm, non-preachy. This is the heart of Kanha's Courtyard."

      # ── Illustration ───────────────────────────────────────
      - label: "Illustration"
        name: "illustration"
        widget: "image"
        required: false
        hint: "An optional illustration for this entry."
        media_folder: "/public/images/kanha-illustrations"
        public_folder: "/images/kanha-illustrations"


# ────────────────────────────────────────────────────────────
# COLLECTION 5: AUTHOR UPDATES
# ────────────────────────────────────────────────────────────

  - name: "updates"
    label: "📝 Author Updates"
    label_singular: "Update"
    folder: "content/updates"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "updates/{{slug}}"
    summary: "{{title}} — {{category}} ({{status}})"

    fields:

      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Announcement", value: "announcement" }
          - { label: "Writing Update", value: "writing_update" }
          - { label: "Behind the Scenes", value: "behind_the_scenes" }
          - { label: "Personal", value: "personal" }
          - { label: "General", value: "general" }
        default: "general"

      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft", value: "draft" }
          - { label: "Published", value: "published" }
        default: "draft"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        hint: "Controls the date shown and sort order."

      - label: "Cover Image"
        name: "cover_image"
        widget: "image"
        required: false
        media_folder: "/public/images/update-covers"
        public_folder: "/images/update-covers"

      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "Short preview shown in the updates feed. 1–2 sentences."

      - label: "Full Post"
        name: "body"
        widget: "markdown"
        hint: "Write your full update here. Think of it like a blog post."


# ────────────────────────────────────────────────────────────
# COLLECTION 6: FEATURED REVIEWS
# You add these manually after reading Google Form responses.
# ────────────────────────────────────────────────────────────

  - name: "featured_reviews"
    label: "⭐ Featured Reviews"
    label_singular: "Review"
    folder: "content/featured-reviews"
    create: true
    slug: "{{slug}}"
    summary: "{{reader_name}} — {{book}} ({{rating}} stars)"

    fields:

      - label: "Reader Name"
        name: "reader_name"
        widget: "string"

      - label: "Reader Handle"
        name: "reader_handle"
        widget: "string"
        required: false
        hint: "Their Wattpad or Instagram handle — e.g. @raghav_simp"

      - label: "Book"
        name: "book"
        widget: "string"
        hint: "Which book is this review for?"

      - label: "Rating"
        name: "rating"
        widget: "select"
        options:
          - { label: "★★★★★ — 5 stars", value: 5 }
          - { label: "★★★★ — 4 stars", value: 4 }
          - { label: "★★★ — 3 stars", value: 3 }
          - { label: "★★ — 2 stars", value: 2 }
          - { label: "★ — 1 star", value: 1 }
        default: 5

      - label: "Review Text"
        name: "body"
        widget: "markdown"
        hint: "Paste the reader's review here exactly as they wrote it."

      - label: "Contains Spoilers"
        name: "contains_spoilers"
        widget: "boolean"
        default: false
        hint: "Turn on to show a spoiler warning on this review."

      - label: "Pin This Review"
        name: "is_pinned"
        widget: "boolean"
        default: false
        hint: "Pinned reviews always appear at the top."

      - label: "Date Submitted"
        name: "date"
        widget: "datetime"


# ────────────────────────────────────────────────────────────
# COLLECTION 7: FEATURED FAN ART
# You add these manually after approving Google Form uploads.
# ────────────────────────────────────────────────────────────

  - name: "fan_art"
    label: "🎨 Featured Fan Art"
    label_singular: "Fan Art"
    folder: "content/fan-art"
    create: true
    slug: "{{slug}}"
    summary: "{{artist_name}} — {{book_or_character}}"

    fields:

      - label: "Artist Name"
        name: "artist_name"
        widget: "string"

      - label: "Artist Handle"
        name: "artist_handle"
        widget: "string"
        required: false
        hint: "e.g. @nightinkbrushes"

      - label: "Platform"
        name: "platform"
        widget: "string"
        required: false
        hint: "Where to find them — Instagram, Twitter, DeviantArt..."

      - label: "Book or Character"
        name: "book_or_character"
        widget: "string"
        hint: "What does this art depict? e.g. Raghav & Sree, Amodini"

      - label: "Description"
        name: "description"
        widget: "text"
        required: false
        hint: "The artist's own description of their work."

      - label: "Artwork Image"
        name: "image"
        widget: "image"
        required: false
        hint: "Upload the fan art file. Get permission from the artist first."
        media_folder: "/public/images/fan-art"
        public_folder: "/images/fan-art"

      - label: "External Link"
        name: "external_link"
        widget: "string"
        required: false
        hint: "If the art is hosted on Instagram or DeviantArt, paste the link here instead."

      - label: "Feature This Piece"
        name: "is_featured"
        widget: "boolean"
        default: true

      - label: "Date"
        name: "date"
        widget: "datetime"


# ────────────────────────────────────────────────────────────
# FILE COLLECTION: LINKTREE LINKS
# All links managed in one place.
# ────────────────────────────────────────────────────────────

  - name: "links"
    label: "🔗 Linktree Links"
    files:
      - label: "All Links"
        name: "linktree"
        file: "content/settings/links.md"
        fields:
          - label: "Links"
            name: "links"
            widget: "list"
            hint: "Drag to reorder. The order here is the order readers see."
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
                hint: "e.g. Wattpad, Instagram, Buy the Book"

              - label: "URL"
                name: "url"
                widget: "string"
                hint: "Full URL including https://"

              - label: "Icon or Emoji"
                name: "icon"
                widget: "string"
                hint: "An emoji that represents this link — 📖 📸 🎵 🛒"

              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Reading", value: "reading" }
                  - { label: "Social", value: "social" }
                  - { label: "Shopping", value: "shopping" }
                  - { label: "Contact", value: "contact" }
                  - { label: "General", value: "general" }

              - label: "Show on Website"
                name: "is_active"
                widget: "boolean"
                default: true
                hint: "Toggle off to hide this link without deleting it."


# ────────────────────────────────────────────────────────────
# FILE COLLECTION: SITE SETTINGS
# Author profile, bio, photo — site-wide settings.
# ────────────────────────────────────────────────────────────

  - name: "settings"
    label: "⚙️ Site Settings"
    files:

      - label: "Author Profile"
        name: "author"
        file: "content/settings/author.md"
        fields:

          - label: "Display Name"
            name: "display_name"
            widget: "string"
            hint: "How your name appears on the website — e.g. Thatbrowncraft"

          - label: "Author Bio"
            name: "body"
            widget: "markdown"
            hint: "Your About page bio. Write freely."

          - label: "Author Photo"
            name: "author_photo"
            widget: "image"
            required: false
            hint: "Your photo for the About page."
            media_folder: "/public/images/author"
            public_folder: "/images/author"

          - label: "Short Tagline"
            name: "tagline"
            widget: "string"
            hint: "One line shown under your name — e.g. stories brewed in chai and candlelight"

          - label: "Fun Facts"
            name: "fun_facts"
            widget: "list"
            required: false
            hint: "Quick facts about you — shown as tags on the About page."
            field:
              label: "Fact"
              name: "fact"
              widget: "string"

      - label: "Site Metadata"
        name: "metadata"
        file: "content/settings/metadata.md"
        fields:

          - label: "Site Title"
            name: "site_title"
            widget: "string"
            hint: "Shown in browser tabs and search results."

          - label: "Meta Description"
            name: "meta_description"
            widget: "text"
            hint: "1–2 sentences. What search engines show under your site name."

          - label: "Social Share Image"
            name: "og_image"
            widget: "image"
            required: false
            hint: "Image shown when someone shares your website on WhatsApp or Instagram."

      - label: "Social Links"
        name: "social"
        file: "content/settings/social.md"
        fields:

          - label: "Wattpad URL"
            name: "wattpad"
            widget: "string"
            required: false

          - label: "Instagram URL"
            name: "instagram"
            widget: "string"
            required: false

          - label: "Spotify URL"
            name: "spotify"
            widget: "string"
            required: false

          - label: "Pinterest URL"
            name: "pinterest"
            widget: "string"
            required: false

          - label: "Google Form — Crafties Post Office"
            name: "form_crafties"
            widget: "string"
            required: false
            hint: "Paste your Google Form link here. This is what the Crafties button opens."

          - label: "Google Form — Submit a Review"
            name: "form_reviews"
            widget: "string"
            required: false

          - label: "Google Form — Fan Art Submission"
            name: "form_fanart"
            widget: "string"
            required: false

          - label: "Google Form — Contact"
            name: "form_contact"
            widget: "string"
            required: false

          # ── Postcard form entry IDs ──────────────────────────────
          # Get these from your form's pre-filled link trick (see GOOGLE_FORMS_SETUP.md)

          - label: "Postcard Form — Action URL"
            name: "form_postcard_url"
            widget: "string"
            required: false
            hint: "The formResponse URL, e.g. https://docs.google.com/forms/d/e/XXXX/formResponse"

          - label: "Postcard Entry ID — Name"
            name: "form_postcard_entry_name"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Crafties' name or username field"

          - label: "Postcard Entry ID — Category"
            name: "form_postcard_entry_category"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Category field"

          - label: "Postcard Entry ID — Message"
            name: "form_postcard_entry_message"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Your letter field"

          - label: "Postcard Entry ID — Want a reply?"
            name: "form_postcard_entry_reply"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Want a reply? field"

          - label: "Postcard Entry ID — Email"
            name: "form_postcard_entry_email"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Email field"

          # ── Review form entry IDs ────────────────────────────────

          - label: "Review Form — Action URL"
            name: "form_review_url"
            widget: "string"
            required: false
            hint: "The formResponse URL for your Leave a Review form"

          - label: "Review Entry ID — Rating"
            name: "form_review_entry_rating"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Your ratings field"

          - label: "Review Entry ID — Review"
            name: "form_review_entry_review"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Your Review field"

          - label: "Review Entry ID — Name"
            name: "form_review_entry_name"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Your name or handle field"

          - label: "Review Entry ID — Spoiler"
            name: "form_review_entry_spoiler"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Contains spoiler? field"

          # ── Fan Art form entry IDs ───────────────────────────────

          - label: "Fan Art Form — Action URL"
            name: "form_fanart_url"
            widget: "string"
            required: false
            hint: "The formResponse URL for your Fan Art Submission form"

          - label: "Fan Art Entry ID — Name"
            name: "form_fanart_entry_name"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Your name or handle field"

          - label: "Fan Art Entry ID — Platform"
            name: "form_fanart_entry_platform"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Platform field"

          - label: "Fan Art Entry ID — Subject"
            name: "form_fanart_entry_subject"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your What does it depict? field"

          - label: "Fan Art Entry ID — Link"
            name: "form_fanart_entry_link"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Paste url of your fan-art field"

          - label: "Fan Art Entry ID — Notes"
            name: "form_fanart_entry_note"
            widget: "string"
            required: false
            hint: "e.g. entry.1234567890 — from your Notes or context field (add this field to your form)"


# ────────────────────────────────────────────────────────────
# COLLECTION 8: HALL OF FAME
# Six entry types, all managed from one collection.
# Entry type controls what fields appear and how the
# public website displays each piece.
# ────────────────────────────────────────────────────────────

  - name: "hall_of_fame"
    label: "🏅 Hall of Fame"
    label_singular: "Hall of Fame Entry"
    folder: "content/hall-of-fame"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    summary: "{{reader_name}} — {{entry_type}} ({{status}})"
    description: >
      Your readers' wall. Feature the people who showed up for
      your stories — in letters, theories, art, reactions, and
      monthly spotlights. Everything here is curated by you.

    fields:

      # ── Entry Type ─────────────────────────────────────────
      # This is the most important field.
      # It tells the website how to display this entry
      # and tells you at a glance what kind of feature it is.

      - label: "Entry Type"
        name: "entry_type"
        widget: "select"
        options:
          - label: "⭐ Featured Reader — spotlight on a loyal reader"
            value: "featured_reader"
          - label: "🎨 Fan Art Showcase — featured artwork"
            value: "fan_art_showcase"
          - label: "💌 Reader Letter — a letter that moved you"
            value: "reader_letter"
          - label: "🔍 Theorist Corner — reader who cracked the plot"
            value: "theorist"
          - label: "📅 Monthly Spotlight — reader of the month"
            value: "monthly_spotlight"
          - label: "😭 Reaction Wall — a reaction worth keeping forever"
            value: "reaction_wall"
        hint: >
          Choose what kind of Hall of Fame entry this is.
          Each type has its own display style on the website.

      # ── Status & Visibility ────────────────────────────────

      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - label: "Draft — only you can see this"
            value: "draft"
          - label: "Published — visible on the Hall of Fame"
            value: "published"
          - label: "Archived — hidden but preserved"
            value: "archived"
        default: "draft"

      - label: "Pin to Top of Hall of Fame"
        name: "is_pinned"
        widget: "boolean"
        default: false
        hint: >
          Pinned entries always appear first, above all others.
          Use for your most treasured submissions.

      - label: "Date"
        name: "date"
        widget: "datetime"
        hint: "When this entry was added or when the spotlight is for."

      # ── Reader Identity ────────────────────────────────────
      # Used by all six entry types.

      - label: "Reader Name or Handle"
        name: "reader_name"
        widget: "string"
        hint: "How they want to be known — real name, Wattpad handle, or anonymous."

      - label: "Reader Platform Handle"
        name: "reader_handle"
        widget: "string"
        required: false
        hint: "e.g. @raghav_simp_4ever — shown as a clickable credit."

      - label: "Platform"
        name: "platform"
        widget: "select"
        required: false
        options:
          - label: "Wattpad"
            value: "wattpad"
          - label: "Instagram"
            value: "instagram"
          - label: "Twitter / X"
            value: "twitter"
          - label: "DeviantArt"
            value: "deviantart"
          - label: "Tumblr"
            value: "tumblr"
          - label: "Pinterest"
            value: "pinterest"
          - label: "Anonymous"
            value: "anonymous"
          - label: "Other"
            value: "other"

      - label: "Reader Profile Link"
        name: "reader_profile_url"
        widget: "string"
        required: false
        hint: "Link to their Wattpad or Instagram profile, if they want to be credited."

      # ── Book / Character Reference ─────────────────────────

      - label: "Related Book"
        name: "related_book"
        widget: "string"
        required: false
        hint: "Which book is this entry about? e.g. Amodini"

      - label: "Related Characters"
        name: "related_characters"
        widget: "list"
        required: false
        hint: "Which characters does this entry feature or mention?"
        field:
          label: "Character Name"
          name: "name"
          widget: "string"

      # ── FEATURED READER fields ─────────────────────────────
      # Entry type: featured_reader
      # A full spotlight on one loyal reader.

      - label: "Reader Since"
        name: "reader_since"
        widget: "string"
        required: false
        hint: "Featured Reader only — e.g. Chapter 3, or Since 2023."

      - label: "Favourite Character"
        name: "favourite_character"
        widget: "string"
        required: false
        hint: "Featured Reader only."

      - label: "Favourite Scene or Chapter"
        name: "favourite_scene"
        widget: "string"
        required: false
        hint: "Featured Reader only — the moment that got them."

      - label: "Reader Photo or Avatar"
        name: "reader_image"
        widget: "image"
        required: false
        hint: "Featured Reader only — upload only with their permission."
        media_folder: "/public/images/hall-of-fame/readers"
        public_folder: "/images/hall-of-fame/readers"

      - label: "Author's Note About This Reader"
        name: "author_note_about_reader"
        widget: "text"
        required: false
        hint: >
          Featured Reader only — write something personal about
          what this reader means to you and your journey.
          This is shown on their spotlight card.

      # ── FAN ART SHOWCASE fields ────────────────────────────
      # Entry type: fan_art_showcase
      # A dedicated, beautiful showcase of one piece of art.

      - label: "Artwork Title"
        name: "artwork_title"
        widget: "string"
        required: false
        hint: "Fan Art Showcase only — the name the artist gave this piece."

      - label: "Artwork Image"
        name: "artwork_image"
        widget: "image"
        required: false
        hint: "Fan Art Showcase only — upload the artwork file."
        media_folder: "/public/images/hall-of-fame/fan-art"
        public_folder: "/images/hall-of-fame/fan-art"

      - label: "Artwork External Link"
        name: "artwork_external_url"
        widget: "string"
        required: false
        hint: >
          Fan Art Showcase only — if the art is on Instagram
          or DeviantArt, paste the link here instead of
          or in addition to uploading.

      - label: "Artist's Description"
        name: "artist_description"
        widget: "text"
        required: false
        hint: "Fan Art Showcase only — what the artist said about their piece."

      - label: "Author's Reaction to the Art"
        name: "author_art_reaction"
        widget: "text"
        required: false
        hint: >
          Fan Art Showcase only — what did you feel when you
          first saw this? This personal note makes the
          showcase feel like a conversation, not a gallery.

      # ── READER LETTER fields ───────────────────────────────
      # Entry type: reader_letter
      # A letter submitted through the Crafties Post Office
      # that you've chosen to preserve and share.

      - label: "Letter Subject"
        name: "letter_subject"
        widget: "string"
        required: false
        hint: "Reader Letter only — the subject or title of their letter."

      - label: "The Letter"
        name: "body"
        widget: "markdown"
        required: false
        hint: >
          Reader Letter, Theorist Corner, and Reaction Wall —
          paste the full text here.
          For Reader Letters: paste their message exactly.
          For Theorist Corner: paste or summarise their theory.
          For Reaction Wall: paste their reaction exactly as written.

      - label: "Why You're Featuring This Letter"
        name: "author_feature_reason"
        widget: "text"
        required: false
        hint: >
          Reader Letter only — a short note from you about
          why this letter stayed with you.
          Readers love knowing what moved the author.

      - label: "Permission to Feature"
        name: "has_permission"
        widget: "boolean"
        default: false
        hint: >
          Reader Letter and Fan Art Showcase —
          confirm the reader gave permission to share publicly.
          Never publish without this switched on.

      # ── THEORIST CORNER fields ─────────────────────────────
      # Entry type: theorist
      # For readers who cracked a plot twist, predicted an ending,
      # or wrote an analysis that genuinely impressed you.

      - label: "Theory Title"
        name: "theory_title"
        widget: "string"
        required: false
        hint: "Theorist Corner only — give their theory a title."

      - label: "Were They Right?"
        name: "theory_correct"
        widget: "select"
        required: false
        options:
          - label: "✓ They got it exactly right"
            value: "correct"
          - label: "◑ Partially right — close but not quite"
            value: "partial"
          - label: "✗ Completely wrong but beautifully argued"
            value: "wrong"
          - label: "🔒 Not revealing yet"
            value: "unrevealed"
        hint: "Theorist Corner only — shown as a badge on their card."

      - label: "Author's Response to the Theory"
        name: "author_theory_response"
        widget: "text"
        required: false
        hint: >
          Theorist Corner only — respond to their theory.
          Did it surprise you? Did they miss something obvious?
          Did they actually figure out a plot point you hadn't
          decided yet? This is the fun part.

      # ── MONTHLY SPOTLIGHT fields ───────────────────────────
      # Entry type: monthly_spotlight
      # Reader of the Month — your featured community member.

      - label: "Spotlight Month and Year"
        name: "spotlight_month"
        widget: "string"
        required: false
        hint: "Monthly Spotlight only — e.g. June 2025"

      - label: "Why They Were Chosen"
        name: "spotlight_reason"
        widget: "markdown"
        required: false
        hint: >
          Monthly Spotlight only — write about why this reader
          earned the spotlight this month. Their support,
          their comments, their presence in the community.

      - label: "Their Favourite Quote from Your Writing"
        name: "reader_favourite_quote"
        widget: "text"
        required: false
        hint: "Monthly Spotlight only — a line they told you they love."

      # ── REACTION WALL fields ───────────────────────────────
      # Entry type: reaction_wall
      # Screenshots, comments, or messages that captured
      # a real emotional reaction worth preserving.

      - label: "Reaction Screenshot"
        name: "reaction_image"
        widget: "image"
        required: false
        hint: >
          Reaction Wall only — upload a screenshot of the
          reaction (DM, comment, story reply).
          Blur names if the reader prefers anonymity.
        media_folder: "/public/images/hall-of-fame/reactions"
        public_folder: "/images/hall-of-fame/reactions"

      - label: "Reaction Context"
        name: "reaction_context"
        widget: "string"
        required: false
        hint: >
          Reaction Wall only — one line of context.
          e.g. After Chapter 42 dropped, or Response to the
          3AM bonus scene.

      - label: "What This Reaction Meant to You"
        name: "author_reaction_note"
        widget: "text"
        required: false
        hint: >
          Reaction Wall only — optional. A line or two about
          why you saved this one. Why it mattered.

      # ── Display Controls ───────────────────────────────────

      - label: "Feature on Homepage"
        name: "is_homepage_feature"
        widget: "boolean"
        default: false
        hint: >
          Show this entry in the Hall of Fame preview
          on the homepage. Use sparingly — 1 or 2 maximum.

      - label: "Display Tags"
        name: "display_tags"
        widget: "list"
        required: false
        hint: >
          Optional tags shown on the card —
          e.g. Team Raghav, Amodini, Chapter 42 Survivor.
          Add as many as you want.
        field:
          label: "Tag"
          name: "tag"
          widget: "string"


